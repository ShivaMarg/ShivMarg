<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer · Cloudinary Images — ShivMarg</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --bg:#0e1117;
    --panel:#161b24;
    --border:#262d3a;
    --text:#e6e9ef;
    --muted:#8b93a3;
    --accent:#ff8a3d;
    --accent-soft:#3a2818;
    --ok:#3ddc84;
    --danger:#ff5c5c;
    --radius:10px;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
  }
  #gate{
    display:flex; align-items:center; justify-content:center;
    height:100vh; text-align:center; padding:20px;
  }
  #gate h1{ color:var(--danger); font-size:20px; }
  #gate p{ color:var(--muted); }

  header{
    position:sticky; top:0; z-index:5;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    padding:16px 24px;
    display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between;
  }
  header h1{
    font-size:18px; margin:0; display:flex; align-items:center; gap:8px;
  }
  header h1 span.tag{
    font-size:11px; background:var(--accent-soft); color:var(--accent);
    padding:2px 8px; border-radius:20px; font-weight:600; letter-spacing:.5px;
  }
  .controls{ display:flex; gap:10px; flex-wrap:wrap; }
  input[type="text"], select{
    background:#0e1117; border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:13px; outline:none;
  }
  input[type="text"]{ min-width:220px; }
  input[type="text"]:focus, select:focus{ border-color:var(--accent); }

  .meta-bar{
    padding:10px 24px; color:var(--muted); font-size:13px;
    border-bottom:1px solid var(--border);
  }

  main{ padding:24px; }

  #grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap:16px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex; flex-direction:column;
    transition: border-color .15s ease, transform .15s ease;
  }
  .card:hover{ border-color:var(--accent); }

  .thumb-wrap{
    background:#0a0d12;
    aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .thumb-wrap img{
    width:100%; height:100%; object-fit:cover;
    cursor:zoom-in;
  }

  .card-body{ padding:10px 12px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .public-id{
    font-size:12px; color:var(--text);
    word-break:break-all;
    line-height:1.3;
  }
  .file-meta{ font-size:11px; color:var(--muted); display:flex; justify-content:space-between; }

  .copy-btn{
    margin-top:auto;
    background:#1f2733; color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:7px 10px;
    font-size:12px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .copy-btn:hover{ background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
  .copy-btn.copied{ background:var(--ok); color:#06241a; border-color:var(--ok); }

  #status{
    text-align:center; color:var(--muted); padding:60px 0; font-size:14px;
  }
  #status.error{ color:var(--danger); }

  /* lightbox */
  #lightbox{
    position:fixed; inset:0; background:rgba(0,0,0,.85);
    display:none; align-items:center; justify-content:center;
    z-index:50; padding:30px;
  }
  #lightbox img{ max-width:90%; max-height:90%; border-radius:8px; }
  #lightbox.show{ display:flex; }

  footer{
    text-align:center; color:var(--muted); font-size:12px; padding:20px;
  }
</style>
</head>
<body>

<div id="gate">
  <div>
    <h1>Access denied</h1>
    <p>This page is restricted to ShivMarg admins.</p>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>🛠️ Developer — Cloudinary Images <span class="tag">admin only</span></h1>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by public ID / folder...">
      <select id="folderFilter">
        <option value="">All folders</option>
      </select>
      <select id="sortSelect">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="largest">Largest size</option>
      </select>
    </div>
  </header>

  <div class="meta-bar" id="metaBar">Loading images…</div>

  <main>
    <div id="status">Fetching images from Cloudinary…</div>
    <div id="grid"></div>
  </main>

  <footer>ShivMarg Developer Tools · Cloudinary Image Browser</footer>
</div>

<div id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
/* ============================================================
   CONFIG — adjust these to match your existing auth setup
   ============================================================ */
const TOKEN_KEY   = "token";                         // localStorage key where your JWT is stored
const API_BASE    = "";                               // e.g. "https://api.shivmarg.live" — leave "" if same origin
const IMAGES_ENDPOINT = `${API_BASE}/admin/cloudinary/images`;

/* ============================================================
   AUTH GATE — decode JWT client-side to check role === "admin"
   (Real enforcement still happens server-side on the endpoint.
   This is just to hide the UI from non-admins instantly.)
   ============================================================ */
function decodeJWT(token){
  try{
    const payload = token.split(".")[1];
    const json = decodeURIComponent(
      atob(payload.replace(/-/g, "+").replace(/_/g, "/"))
        .split("").map(c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)).join("")
    );
    return JSON.parse(json);
  }catch(e){ return null; }
}

function getAuthHeaders(){
  const token = localStorage.getItem(TOKEN_KEY);
  return token ? { "Authorization": `Bearer ${token}` } : {};
}

function checkAdminAccess(){
  const token = localStorage.getItem(TOKEN_KEY);
  if(!token) return false;
  const payload = decodeJWT(token);
  return !!payload && payload.role === "admin";
}

/* ============================================================
   APP LOGIC
   ============================================================ */
let allImages = [];

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function formatBytes(bytes){
  if(!bytes) return "—";
  const units = ["B","KB","MB","GB"];
  let i = 0, val = bytes;
  while(val >= 1024 && i < units.length-1){ val/=1024; i++; }
  return `${val.toFixed(1)} ${units[i]}`;
}

function renderGrid(images){
  const grid = document.getElementById("grid");
  const status = document.getElementById("status");

  if(images.length === 0){
    grid.innerHTML = "";
    status.textContent = "No images match your filters.";
    status.style.display = "block";
    return;
  }
  status.style.display = "none";

  grid.innerHTML = images.map((img, idx) => `
    <div class="card" data-idx="${idx}">
      <div class="thumb-wrap">
        <img src="${img.url}" alt="${escapeHtml(img.public_id)}" loading="lazy" onclick="openLightbox('${img.url}')">
      </div>
      <div class="card-body">
        <div class="public-id">${escapeHtml(img.public_id)}</div>
        <div class="file-meta">
          <span>${img.format?.toUpperCase() || ""}</span>
          <span>${formatBytes(img.bytes)}</span>
        </div>
        <button class="copy-btn" onclick="copyLink('${img.url}', this)">
          📋 Copy link
        </button>
      </div>
    </div>
  `).join("");
}

function copyLink(url, btnEl){
  navigator.clipboard.writeText(url).then(() => {
    const original = btnEl.innerHTML;
    btnEl.innerHTML = "✅ Copied!";
    btnEl.classList.add("copied");
    setTimeout(() => {
      btnEl.innerHTML = original;
      btnEl.classList.remove("copied");
    }, 1500);
  }).catch(() => {
    // fallback for older browsers
    const ta = document.createElement("textarea");
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btnEl.textContent = "✅ Copied!";
    setTimeout(() => btnEl.innerHTML = "📋 Copy link", 1500);
  });
}

function openLightbox(url){
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").classList.add("show");
}
document.getElementById("lightbox").addEventListener("click", () => {
  document.getElementById("lightbox").classList.remove("show");
});

function populateFolderFilter(images){
  const select = document.getElementById("folderFilter");
  const folders = [...new Set(images.map(i => i.folder).filter(Boolean))].sort();
  folders.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f;
    select.appendChild(opt);
  });
}

function applyFilters(){
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const folder = document.getElementById("folderFilter").value;
  const sort = document.getElementById("sortSelect").value;

  let filtered = allImages.filter(img => {
    const matchesQuery = !q || img.public_id.toLowerCase().includes(q);
    const matchesFolder = !folder || img.folder === folder;
    return matchesQuery && matchesFolder;
  });

  if(sort === "newest") filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  if(sort === "oldest") filtered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  if(sort === "largest") filtered.sort((a,b) => (b.bytes||0) - (a.bytes||0));

  document.getElementById("metaBar").textContent =
    `Showing ${filtered.length} of ${allImages.length} images`;
  renderGrid(filtered);
}

["searchInput","folderFilter","sortSelect"].forEach(id => {
  document.getElementById(id).addEventListener("input", applyFilters);
});

async function loadImages(){
  const status = document.getElementById("status");
  try{
    const res = await fetch(IMAGES_ENDPOINT, { headers: getAuthHeaders() });
    if(res.status === 403){
      status.textContent = "Server rejected access — admin role required.";
      status.classList.add("error");
      return;
    }
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    allImages = data.images || [];

    populateFolderFilter(allImages);
    document.getElementById("metaBar").textContent = `Showing ${allImages.length} of ${allImages.length} images`;
    renderGrid(allImages);
  }catch(err){
    status.textContent = "Failed to load images: " + err.message;
    status.classList.add("error");
  }
}

/* ============================================================
   BOOT
   ============================================================ */
(function init(){
  if(checkAdminAccess()){
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadImages();
  } else {
    document.getElementById("gate").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
})();
</script>
</body>
</html>
