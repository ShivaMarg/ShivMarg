<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudinary Images — ShivMarg</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:system-ui, sans-serif;
    background:#0e1117; color:#e6e9ef; padding:24px;
  }
  h1{ font-size:18px; margin-bottom:16px; }
  #status{ color:#8b93a3; padding:40px 0; text-align:center; }
  #grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap:16px;
  }
  .card{
    background:#161b24; border:1px solid #262d3a; border-radius:10px;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .card img{
    width:100%; aspect-ratio:1/1; object-fit:cover; background:#0a0d12;
  }
  .card-body{ padding:10px; display:flex; flex-direction:column; gap:6px; }
  .public-id{ font-size:11px; color:#8b93a3; word-break:break-all; }
  .copy-btn{
    background:#1f2733; color:#e6e9ef; border:1px solid #262d3a;
    border-radius:8px; padding:7px; font-size:12px; cursor:pointer;
  }
  .copy-btn.copied{ background:#3ddc84; color:#06241a; border-color:#3ddc84; }
</style>
</head>
<body>

<h1>📷 ShivMarg — Cloudinary Images</h1>
<div id="status">Loading images…</div>
<div id="grid"></div>

<script>
// Change this to your backend URL if different origin
const API_URL = "https://www.api.shivmarg.live/cloudinary-images";

function copyLink(url, btn){
  navigator.clipboard.writeText(url).then(() => {
    const old = btn.textContent;
    btn.textContent = "✅ Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = old; btn.classList.remove("copied"); }, 1500);
  });
}

async function loadImages(){
  const status = document.getElementById("status");
  const grid = document.getElementById("grid");
  try{
    const res = await fetch(API_URL);
    const data = await res.json();
    const images = data.images || [];

    if(images.length === 0){
      status.textContent = "No images found.";
      return;
    }
    status.style.display = "none";

    grid.innerHTML = images.map(img => `
      <div class="card">
        <img src="${img.url}" loading="lazy">
        <div class="card-body">
          <div class="public-id">${img.public_id}</div>
          <button class="copy-btn" onclick="copyLink('${img.url}', this)">📋 Copy link</button>
        </div>
      </div>
    `).join("");
  }catch(err){
    status.textContent = "Failed to load images: " + err.message;
  }
}

loadImages();
</script>
</body>
</html>
