<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShivMarg — Upload Image</title>
<meta name="robots" content="noindex, nofollow">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: #0a0d12;
  color: #e0e4ef;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px;
}

h1 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #f0f2ff;
}
.subtitle {
  font-size: 13px;
  color: #5a6380;
  margin-bottom: 32px;
}

.card {
  background: #111622;
  border: 1px solid #1e2840;
  border-radius: 14px;
  padding: 28px;
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ---------- drop zone ---------- */
#drop-zone {
  border: 2px dashed #2a3550;
  border-radius: 10px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
#drop-zone.drag-over {
  border-color: #4a7ddb;
  background: #131d30;
}
#drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
#drop-icon {
  font-size: 36px;
  margin-bottom: 10px;
  opacity: .6;
}
#drop-label {
  font-size: 14px;
  color: #8090b0;
  line-height: 1.5;
}
#drop-label span {
  color: #5b8de8;
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ---------- preview ---------- */
#preview-wrap {
  display: none;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}
#preview-img {
  width: 100%;
  max-height: 240px;
  object-fit: contain;
  border-radius: 8px;
  background: #0a0d12;
  border: 1px solid #1e2840;
}
#file-info {
  font-size: 12px;
  color: #5a6380;
  text-align: center;
}
#clear-btn {
  background: none;
  border: 1px solid #2a3550;
  border-radius: 6px;
  color: #8090b0;
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
#clear-btn:hover { border-color: #e24b4a; color: #e24b4a; }

/* ---------- folder input ---------- */
.field label {
  display: block;
  font-size: 12px;
  color: #5a6380;
  margin-bottom: 6px;
  font-weight: 500;
  letter-spacing: .03em;
  text-transform: uppercase;
}
.field input {
  width: 100%;
  background: #0e1420;
  border: 1px solid #1e2840;
  border-radius: 8px;
  color: #e0e4ef;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .15s;
}
.field input::placeholder { color: #2e3a55; }
.field input:focus { border-color: #4a7ddb; }

/* ---------- upload button ---------- */
#upload-btn {
  width: 100%;
  padding: 13px;
  background: #2a5dbf;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, opacity .15s;
}
#upload-btn:hover:not(:disabled) { background: #3a6fcf; }
#upload-btn:disabled { opacity: .45; cursor: not-allowed; }

/* ---------- progress ---------- */
#progress-wrap {
  display: none;
  flex-direction: column;
  gap: 8px;
}
#progress-bar-bg {
  height: 6px;
  background: #1e2840;
  border-radius: 99px;
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  background: #4a7ddb;
  border-radius: 99px;
  width: 0%;
  transition: width .2s;
}
#progress-label {
  font-size: 12px;
  color: #5a6380;
  text-align: center;
}

/* ---------- result ---------- */
#result-box {
  display: none;
  background: #0c1a10;
  border: 1px solid #1a4025;
  border-radius: 10px;
  padding: 16px;
  display: none;
  flex-direction: column;
  gap: 10px;
}
#result-box.visible { display: flex; }
#result-title {
  font-size: 13px;
  font-weight: 600;
  color: #3ddc84;
}
.result-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.result-row .rlabel {
  font-size: 11px;
  color: #3a6050;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.result-row .rval {
  font-size: 12px;
  color: #a0d8b0;
  word-break: break-all;
  font-family: monospace;
  background: #081510;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #1a3525;
  transition: border-color .15s;
}
.result-row .rval:hover { border-color: #3ddc84; }
.copy-hint {
  font-size: 11px;
  color: #2d5040;
}

/* ---------- error ---------- */
#error-box {
  display: none;
  background: #1a0c0c;
  border: 1px solid #401a1a;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  color: #e87070;
}
#error-box.visible { display: block; }

/* ---------- history ---------- */
#history-section { width: 100%; max-width: 560px; margin-top: 32px; }
#history-section h2 { font-size: 14px; font-weight: 600; color: #8090b0; margin-bottom: 14px; }
#history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.hist-card {
  background: #111622;
  border: 1px solid #1e2840;
  border-radius: 10px;
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.hist-thumb {
  width: 52px;
  height: 52px;
  object-fit: cover;
  border-radius: 6px;
  background: #0a0d12;
  flex-shrink: 0;
}
.hist-info { flex: 1; min-width: 0; }
.hist-pid {
  font-size: 11px;
  color: #5a6380;
  font-family: monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hist-url {
  font-size: 11px;
  color: #3d6eb0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.hist-copy {
  background: #1a2435;
  border: 1px solid #2a3550;
  border-radius: 6px;
  color: #8090b0;
  font-size: 11px;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.hist-copy:hover { border-color: #4a7ddb; color: #a0c0f0; }
.hist-copy.ok { background: #0c2016; border-color: #3ddc84; color: #3ddc84; }
</style>

</head>
<body>

<h1>📷 Upload to Cloudinary</h1>
<p class="subtitle">Direct upload — your API secret is never exposed</p>

<div class="card">

  <!-- Config (edit these two lines) -->
  <script>
    const CLOUD_NAME   = "drzt5llbh";           // ← your cloud name
    const UPLOAD_PRESET = "ml_default";   // ← your unsigned preset name
  </script>

  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*" multiple>
    <div id="drop-icon">🖼️</div>
    <div id="drop-label">
      <span>Click to choose</span> or drag &amp; drop images here<br>
      <small style="color:#2e3a55;font-size:11px;margin-top:4px;display:block">PNG, JPG, WEBP, SVG — up to 10MB each</small>
    </div>
  </div>

  <!-- Preview (single file) -->
  <div id="preview-wrap">
    <img id="preview-img" alt="preview">
    <div id="file-info"></div>
    <button id="clear-btn">✕ Remove</button>
  </div>

  <!-- Folder -->
  <div class="field">
    <label for="folder-input">Folder (optional)</label>
    <input type="text" id="folder-input" placeholder="e.g. gods/shiva or mantras" value="shivmarg">
  </div>

  <!-- Upload button -->
  <button id="upload-btn" disabled>Upload image</button>

  <!-- Progress -->
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="progress-label">Uploading…</div>
  </div>

  <!-- Result -->
  <div id="result-box">
    <div id="result-title">✅ Uploaded successfully</div>
    <div class="result-row">
      <span class="rlabel">Secure URL</span>
      <div class="rval" id="res-url" title="Click to copy"></div>
    </div>
    <div class="result-row">
      <span class="rlabel">Public ID</span>
      <div class="rval" id="res-pid" title="Click to copy"></div>
    </div>
    <div class="copy-hint">Click any value to copy it</div>
  </div>

  <!-- Error -->
  <div id="error-box"></div>

</div>

<!-- Upload history (session) -->
<div id="history-section" style="display:none">
  <h2>Uploaded this session</h2>
  <div id="history-list"></div>
</div>

<script>
const fileInput   = document.getElementById("file-input");
const dropZone    = document.getElementById("drop-zone");
const previewWrap = document.getElementById("preview-wrap");
const previewImg  = document.getElementById("preview-img");
const fileInfo    = document.getElementById("file-info");
const clearBtn    = document.getElementById("clear-btn");
const folderInput = document.getElementById("folder-input");
const uploadBtn   = document.getElementById("upload-btn");
const progressWrap= document.getElementById("progress-wrap");
const progressBar = document.getElementById("progress-bar");
const progressLbl = document.getElementById("progress-label");
const resultBox   = document.getElementById("result-box");
const resUrl      = document.getElementById("res-url");
const resPid      = document.getElementById("res-pid");
const errorBox    = document.getElementById("error-box");
const histSection = document.getElementById("history-section");
const histList    = document.getElementById("history-list");

let selectedFile = null;
const uploadHistory = [];

/* ---- drag & drop ---- */
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(file) {
  selectedFile = file;
  const mb = (file.size / 1024 / 1024).toFixed(2);
  fileInfo.textContent = `${file.name} — ${mb} MB`;
  const reader = new FileReader();
  reader.onload = e => { previewImg.src = e.target.result; };
  reader.readAsDataURL(file);
  dropZone.style.display = "none";
  previewWrap.style.display = "flex";
  uploadBtn.disabled = false;
  hideMessages();
}

clearBtn.addEventListener("click", resetFile);
function resetFile() {
  selectedFile = null;
  fileInput.value = "";
  previewImg.src = "";
  dropZone.style.display = "";
  previewWrap.style.display = "none";
  uploadBtn.disabled = true;
  hideMessages();
}

function hideMessages() {
  resultBox.classList.remove("visible");
  errorBox.classList.remove("visible");
  progressWrap.style.display = "none";
  progressBar.style.width = "0%";
}

/* ---- upload ---- */
uploadBtn.addEventListener("click", () => {
  if (!selectedFile) return;
  hideMessages();
  uploadBtn.disabled = true;
  progressWrap.style.display = "flex";
  progressLbl.textContent = "Uploading…";

  const folder = folderInput.value.trim();
  const formData = new FormData();
  formData.append("file", selectedFile);
  formData.append("upload_preset", UPLOAD_PRESET);
  if (folder) formData.append("folder", folder);

  const xhr = new XMLHttpRequest();
  const endpoint = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
  xhr.open("POST", endpoint);

  xhr.upload.addEventListener("progress", e => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      progressBar.style.width = pct + "%";
      progressLbl.textContent = `Uploading… ${pct}%`;
    }
  });

  xhr.addEventListener("load", () => {
    progressWrap.style.display = "none";
    uploadBtn.disabled = false;
    if (xhr.status === 200) {
      const data = JSON.parse(xhr.responseText);
      showResult(data);
      addToHistory(data);
      resetFile();
    } else {
      let msg = "Upload failed.";
      try { msg = JSON.parse(xhr.responseText).error?.message || msg; } catch(e) {}
      showError(msg);
    }
  });

  xhr.addEventListener("error", () => {
    progressWrap.style.display = "none";
    uploadBtn.disabled = false;
    showError("Network error — check your internet connection.");
  });

  xhr.send(formData);
});

function showResult(data) {
  resUrl.textContent = data.secure_url;
  resPid.textContent = data.public_id;
  resultBox.classList.add("visible");
  resUrl.onclick = () => copyText(data.secure_url, resUrl);
  resPid.onclick = () => copyText(data.public_id, resPid);
}

function showError(msg) {
  errorBox.textContent = "⚠️ " + msg;
  errorBox.classList.add("visible");
}

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = el.style.color;
    el.style.color = "#3ddc84";
    setTimeout(() => { el.style.color = orig; }, 1000);
  });
}

/* ---- history ---- */
function addToHistory(data) {
  uploadHistory.unshift(data);
  histSection.style.display = "";
  const card = document.createElement("div");
  card.className = "hist-card";
  card.innerHTML = `
    <img class="hist-thumb" src="${data.secure_url}" alt="">
    <div class="hist-info">
      <div class="hist-pid">${data.public_id}</div>
      <div class="hist-url" title="${data.secure_url}">${data.secure_url}</div>
    </div>
    <button class="hist-copy" data-url="${data.secure_url}">Copy URL</button>
  `;
  card.querySelector(".hist-copy").addEventListener("click", function() {
    navigator.clipboard.writeText(this.dataset.url).then(() => {
      const prev = this.textContent;
      this.textContent = "Copied!";
      this.classList.add("ok");
      setTimeout(() => { this.textContent = prev; this.classList.remove("ok"); }, 1500);
    });
  });
  histList.prepend(card);
}
</script>
</body>
</html>
