<html lang="hi">
<head>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #04020E;
    --bg-card:    #0C0520;
    --bg-card2:   #110830;
    --border:     rgba(124,77,255,0.22);
    --border-h:   rgba(124,77,255,0.5);
    --gold:       #C9A84C;
    --gold-light: #E8C96A;
    --violet:     #7C4DFF;
    --violet-l:   #B39DDB;
    --text:       #F3EEFF;
    --text-muted: rgba(243,238,255,0.5);
    --text-dim:   rgba(243,238,255,0.3);
    --red:        #FF8A80;
    --success:    #80CBC4;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── starfield bg ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,77,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(4,2,16,0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1rem; color: var(--gold-light); letter-spacing: 2px;
    text-decoration: none;
  }
  .nav-back {
    font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 2px;
    color: var(--text-muted); text-transform: uppercase;
    background: none; border: 1px solid var(--border);
    padding: 6px 14px; cursor: pointer;
    text-decoration: none; transition: all .25s;
  }
  .nav-back:hover { border-color: var(--border-h); color: var(--text); }

  /* ── LAYOUT ── */
  .page { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

  /* ── PROFILE HERO ── */
  .hero {
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
    border: 1px solid var(--border);
    background: var(--bg-card);
    padding: 28px 32px; margin-bottom: 1.5rem;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--violet), var(--gold), var(--violet), transparent);
  }
  .hero-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel Decorative', serif; font-size: 1.6rem; color: #fff;
    border: 2px solid var(--border-h); flex-shrink: 0;
  }
  .hero-name { font-family: 'Cinzel Decorative', serif; font-size: 1.2rem; color: var(--gold-light); }
  .hero-username { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 3px; color: var(--violet-l); margin-top: 4px; }
  .hero-email { font-size: 0.88rem; color: var(--text-muted); margin-top: 4px; }
  .hero-joined { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 8px; }

  .stats-row { display: flex; gap: 20px; margin-left: auto; flex-wrap: wrap; }
  .stat-box { text-align: center; min-width: 64px; }
  .stat-num { font-family: 'Cinzel Decorative', serif; font-size: 1.6rem; color: var(--gold); }
  .stat-lbl { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 0;
    border: 1px solid var(--border); margin-bottom: 1.5rem;
  }
  .tab {
    flex: 1; padding: 11px 8px; text-align: center;
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-muted); cursor: pointer; background: none; border: none;
    border-right: 1px solid var(--border); transition: all .25s;
  }
  .tab:last-child { border-right: none; }
  .tab.active { background: rgba(124,77,255,0.14); color: var(--violet-l); }
  .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

  /* ── PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 24px 28px; margin-bottom: 1rem;
    position: relative;
  }
  .card-title {
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 3px;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 18px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }

  /* ── FORM ── */
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .fields.single { grid-template-columns: 1fr; }
  .fields.three  { grid-template-columns: 1fr 1fr 1fr; }
  @media(max-width: 560px) { .fields, .fields.three { grid-template-columns: 1fr; } }

  .field label {
    display: block; font-family: 'Cinzel', serif; font-size: 0.6rem;
    letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: rgba(0,0,0,0.45);
    border: 1px solid var(--border);
    color: var(--text); padding: 10px 13px;
    font-family: 'EB Garamond', serif; font-size: 0.95rem;
    outline: none; transition: border-color .25s; border-radius: 0;
  }
  .field input::placeholder { color: var(--text-dim); }
  .field input:focus { border-color: var(--violet); }
  .field input[disabled] { opacity: 0.45; cursor: not-allowed; }

  .form-footer { display: flex; align-items: center; gap: 14px; margin-top: 18px; }
  .btn-save {
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
    background: rgba(124,77,255,0.15); border: 1px solid rgba(124,77,255,0.4);
    color: var(--violet-l); padding: 10px 22px; cursor: pointer;
    transition: all .25s; position: relative; overflow: hidden;
  }
  .btn-save::before { content:''; position:absolute; inset:0; background:rgba(124,77,255,0.2); opacity:0; transition:opacity .25s; }
  .btn-save:hover::before { opacity:1; }
  .btn-save:disabled { opacity: 0.45; cursor: wait; }
  .btn-save span { position: relative; z-index:1; }

  .save-ok  { font-size: 0.82rem; color: var(--success); font-style: italic; opacity:0; transition: opacity .3s; }
  .save-ok.show { opacity:1; }
  .save-err { font-size: 0.82rem; color: var(--red); font-style: italic; min-height: 18px; }

  /* ── COMMENT CARDS ── */
  .comment-item {
    padding: 14px 0; border-bottom: 1px solid var(--border);
    animation: fadein .3s ease;
  }
  .comment-item:last-child { border-bottom: none; padding-bottom: 0; }
  @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .page-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 3px 10px; margin-bottom: 8px;
    cursor: pointer; text-decoration: none; transition: all .2s;
  }
  .page-pill:hover { background: rgba(201,168,76,0.2); border-color: rgba(201,168,76,0.5); }

  .comment-text { font-size: 0.97rem; color: var(--text); line-height: 1.6; }
  .comment-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 5px; font-style: italic; }

  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--text-dim); font-style: italic; font-size: 0.95rem;
  }
  .empty-state .sym { font-size: 2rem; display: block; margin-bottom: 10px; opacity: .4; }

  /* ── LOADER ── */
  .loader {
    text-align: center; padding: 2rem;
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 3px;
    color: var(--text-dim); text-transform: uppercase;
  }
  .loader::after { content: ''; display: inline-block; width: 12px; height: 12px; border: 1px solid var(--violet); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; margin-left: 10px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #profile-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(20,8,50,0.95); border: 1px solid var(--border-h);
    color: var(--violet-l); font-family: 'Cinzel', serif; font-size: 0.68rem; letter-spacing: 2px;
    padding: 10px 24px; z-index: 9999; opacity: 0;
    transition: opacity .4s; white-space: nowrap; pointer-events: none;
  }
  #profile-toast.show { opacity: 1; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  .danger-zone { border-color: rgba(255,80,80,0.25); }
  .danger-zone .card-title { color: rgba(255,128,128,0.5); }
  .btn-danger {
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
    background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3);
    color: var(--red); padding: 10px 22px; cursor: pointer; transition: all .25s;
  }
  .btn-danger:hover { background: rgba(255,80,80,0.2); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">🕉️ ShivaMarg</a>
  <a class="nav-back" href="javascript:history.back()">← वापस जाएँ</a>
</nav>

<div class="page" id="app">
  <div class="loader" id="page-loader">प्रोफ़ाइल लोड हो रही है</div>
</div>

<div id="profile-toast"></div>

<!-- Load your existing auth.js first -->
<script src="/js/auth.js"></script>
<script>
  const API = 'https://shivamargbackend.onrender.com';

  /* ── helpers ── */
  function toast(msg, dur=2800) {
    const el = document.getElementById('profile-toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), dur);
  }

  function authHeader() {
    const tok = SmAuth.getToken();
    return tok ? { 'Authorization': 'Bearer ' + tok } : {};
  }

  async function apiFetch(path, opts={}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...authHeader() },
      ...opts
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'अनुरोध विफल हुआ');
    return data;
  }

  /* ── flash helpers ── */
  function flashOk(id)  { const e=document.getElementById(id); e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2500); }
  function setErr(id,m) { const e=document.getElementById(id); if(e) e.textContent=m||''; }

  /* ── AVATAR colors (same map as auth.js) ── */
  const COLORS = {A:'linear-gradient(135deg,#E53935,#B71C1C)',B:'linear-gradient(135deg,#D81B60,#880E4F)',C:'linear-gradient(135deg,#8E24AA,#4A148C)',D:'linear-gradient(135deg,#5E35B1,#311B92)',E:'linear-gradient(135deg,#3949AB,#1A237E)',F:'linear-gradient(135deg,#1E88E5,#0D47A1)',G:'linear-gradient(135deg,#039BE5,#01579B)',H:'linear-gradient(135deg,#00ACC1,#006064)',I:'linear-gradient(135deg,#00897B,#004D40)',J:'linear-gradient(135deg,#43A047,#1B5E20)',K:'linear-gradient(135deg,#7CB342,#33691E)',L:'linear-gradient(135deg,#C0CA33,#827717)',M:'linear-gradient(135deg,#F9A825,#F57F17)',N:'linear-gradient(135deg,#FB8C00,#E65100)',O:'linear-gradient(135deg,#F4511E,#BF360C)',P:'linear-gradient(135deg,#8D6E63,#4E342E)',Q:'linear-gradient(135deg,#546E7A,#263238)',R:'linear-gradient(135deg,#EC407A,#AD1457)',S:'linear-gradient(135deg,#7C4DFF,#4527A0)',T:'linear-gradient(135deg,#00BCD4,#00838F)',U:'linear-gradient(135deg,#FF7043,#BF360C)',V:'linear-gradient(135deg,#26A69A,#00695C)',W:'linear-gradient(135deg,#AB47BC,#6A1B9A)',X:'linear-gradient(135deg,#EF5350,#C62828)',Y:'linear-gradient(135deg,#FDD835,#F9A825)',Z:'linear-gradient(135deg,#29B6F6,#0277BD)'};
  function avatarBg(l){ return COLORS[(l||'S').toUpperCase()] || 'linear-gradient(135deg,#7C4DFF,#512DA8)'; }

  /* ── page title lookup ── */
  const PAGE_TITLES = {
    'shiv-aarti':         'शिव आरती',
    'maha-mrityunjaya':   'महा मृत्युंजय मंत्र',
    'kashi-vishwanath':   'काशी विश्वनाथ',
    'om-namah-shivaya':   'ॐ नमः शिवाय',
    'rudrashtakam':       'रुद्राष्टकम्',
    'shiv-chalisa':       'शिव चालीसा',
  };
  function pageTitle(id){ return PAGE_TITLES[id] || id.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

  /* ── RENDER ── */
  function renderApp(user, comments) {
    const av = (user.avatar && user.avatar.length===1) ? user.avatar : user.username[0];
    const joined = new Date(user.created_at).toLocaleDateString('hi-IN',{year:'numeric',month:'long'});

    const uniquePages = [...new Set(comments.map(c=>c.page_id))];
    const totalLikes  = comments.reduce((s,c)=>s+(c.likes||0),0);

    document.getElementById('app').innerHTML = `
      <!-- HERO -->
      <div class="hero">
        <div class="hero-avatar" style="background:${avatarBg(av)}">${av.toUpperCase()}</div>
        <div style="flex:1;min-width:140px">
          <div class="hero-name" id="hero-name">${user.display_name||user.username}</div>
          <div class="hero-username">@${user.username}</div>
          <div class="hero-email">${user.email}</div>
          <div class="hero-joined">🕉️ सदस्य बने: ${joined}</div>
        </div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num">${comments.length}</div><div class="stat-lbl">टिप्पणियाँ</div></div>
          <div class="stat-box"><div class="stat-num">${uniquePages.length}</div><div class="stat-lbl">पृष्ठ</div></div>
          <div class="stat-box"><div class="stat-num">${totalLikes}</div><div class="stat-lbl">पसंद</div></div>
        </div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('comments')">टिप्पणियाँ</button>
        <button class="tab" onclick="switchTab('account')">खाता बदलें</button>
        <button class="tab" onclick="switchTab('details')">व्यक्तिगत विवरण</button>
        <button class="tab" onclick="switchTab('password')">पासवर्ड</button>
      </div>

      <!-- PANEL: Comments -->
      <div class="panel active" id="panel-comments">
        <div class="card">
          <div class="card-title">मेरी टिप्पणियाँ</div>
          ${comments.length === 0 ? `
            <div class="empty-state">
              <span class="sym">🔱</span>
              अभी तक कोई टिप्पणी नहीं। किसी पृष्ठ पर जाकर अपने विचार साझा करें।
            </div>` :
            comments.map(c=>`
              <div class="comment-item">
                <a class="page-pill" href="/${c.page_id}">🔱 ${pageTitle(c.page_id)} →</a>
                <div class="comment-text">${escHtml(c.text)}</div>
                <div class="comment-meta">${timeAgo(c.created_at)} &middot; ${c.likes||0} पसंद</div>
              </div>`).join('')
          }
        </div>
      </div>

      <!-- PANEL: Account -->
      <div class="panel" id="panel-account">
        <div class="card">
          <div class="card-title">खाता जानकारी बदलें</div>
          <div class="fields">
            <div class="field"><label>प्रदर्शन नाम</label><input id="f-dname" value="${escAttr(user.display_name||user.username)}" placeholder="आपका नाम"></div>
            <div class="field"><label>उपयोगकर्ता नाम</label><input id="f-uname" value="${escAttr(user.username)}" placeholder="username"></div>
          </div>
          <div class="fields single" style="margin-top:14px">
            <div class="field"><label>ईमेल</label><input id="f-email" type="email" value="${escAttr(user.email)}" placeholder="email@example.com"></div>
          </div>
          <div class="save-err" id="err-account"></div>
          <div class="form-footer">
            <button class="btn-save" id="btn-account" onclick="saveAccount()"><span>🔱 सहेजें</span></button>
            <span class="save-ok" id="ok-account">✓ परिवर्तन सहेजे गए</span>
          </div>
        </div>
      </div>

      <!-- PANEL: Personal Details -->
      <div class="panel" id="panel-details">
        <div class="card">
          <div class="card-title">व्यक्तिगत विवरण</div>
          <div class="fields">
            <div class="field"><label>मोबाइल नंबर</label><input id="f-mobile" type="tel" value="${escAttr(user.mobile||'')}" placeholder="+91 98765 43210"></div>
            <div class="field"><label>जन्म तिथि</label><input id="f-dob" type="date" value="${escAttr(user.dob||'')}"></div>
          </div>
          <div class="fields single" style="margin-top:14px">
            <div class="field"><label>पता (लाइन 1)</label><input id="f-addr1" value="${escAttr((user.address||{}).line1||'')}" placeholder="मकान नं. / गली / मोहल्ला"></div>
          </div>
          <div class="fields three" style="margin-top:14px">
            <div class="field"><label>शहर</label><input id="f-city" value="${escAttr((user.address||{}).city||'')}" placeholder="दिल्ली"></div>
            <div class="field"><label>राज्य</label><input id="f-state" value="${escAttr((user.address||{}).state||'')}" placeholder="दिल्ली"></div>
            <div class="field"><label>पिन कोड</label><input id="f-pin" value="${escAttr((user.address||{}).pin||'')}" placeholder="110001"></div>
          </div>
          <div class="fields single" style="margin-top:14px">
            <div class="field"><label>देश</label><input id="f-country" value="${escAttr((user.address||{}).country||'India')}" placeholder="India"></div>
          </div>
          <div class="save-err" id="err-details"></div>
          <div class="form-footer">
            <button class="btn-save" id="btn-details" onclick="saveDetails()"><span>🔱 सहेजें</span></button>
            <span class="save-ok" id="ok-details">✓ विवरण सहेजे गए</span>
          </div>
        </div>
      </div>

      <!-- PANEL: Password -->
      <div class="panel" id="panel-password">
        <div class="card">
          <div class="card-title">पासवर्ड बदलें</div>
          <div class="fields single">
            <div class="field"><label>वर्तमान पासवर्ड</label><input id="f-oldpwd" type="password" placeholder="अपना पुराना पासवर्ड दर्ज करें"></div>
          </div>
          <div class="fields" style="margin-top:14px">
            <div class="field"><label>नया पासवर्ड</label><input id="f-newpwd" type="password" placeholder="न्यूनतम 6 अक्षर"></div>
            <div class="field"><label>पुनः दर्ज करें</label><input id="f-cfmpwd" type="password" placeholder="नया पासवर्ड दोहराएँ"></div>
          </div>
          <div class="save-err" id="err-pwd"></div>
          <div class="form-footer">
            <button class="btn-save" id="btn-pwd" onclick="savePassword()"><span>🔒 पासवर्ड बदलें</span></button>
            <span class="save-ok" id="ok-pwd">✓ पासवर्ड अपडेट हुआ</span>
          </div>
        </div>

        <div class="card danger-zone">
          <div class="card-title">⚠ खाता लॉगआउट</div>
          <p style="font-size:.9rem;color:var(--text-muted);margin-bottom:16px">सभी डिवाइस से लॉगआउट करें और होम पेज पर जाएँ।</p>
          <button class="btn-danger" onclick="doLogout()">लॉगआउट करें</button>
        </div>
      </div>
    `;
  }

  /* ── TAB switch ── */
  function switchTab(id) {
    document.querySelectorAll('.tab').forEach((t,i)=>{
      t.classList.toggle('active', ['comments','account','details','password'][i]===id);
    });
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+id).classList.add('active');
  }

  /* ── SAVE: account ── */
  async function saveAccount() {
    const btn = document.getElementById('btn-account');
    const dn  = document.getElementById('f-dname').value.trim();
    const un  = document.getElementById('f-uname').value.trim();
    const em  = document.getElementById('f-email').value.trim();
    setErr('err-account','');
    btn.disabled = true;
    try {
      const u = await apiFetch('/api/auth/profile', {
        method: 'PATCH',
        body: JSON.stringify({ display_name: dn, username: un, email: em })
      });
      // Update stored user
      SmAuth._user = u; localStorage.setItem('sm_user', JSON.stringify(u));
      document.getElementById('hero-name').textContent = u.display_name || u.username;
      flashOk('ok-account');
      toast('🙏 जानकारी अपडेट हुई');
    } catch(e) { setErr('err-account', e.message); }
    finally { btn.disabled = false; }
  }

  /* ── SAVE: details ── */
  async function saveDetails() {
    const btn = document.getElementById('btn-details');
    setErr('err-details','');
    btn.disabled = true;
    try {
      await apiFetch('/api/auth/details', {
        method: 'PUT',
        body: JSON.stringify({
          mobile: document.getElementById('f-mobile').value.trim(),
          dob:    document.getElementById('f-dob').value || null,
          address: {
            line1:   document.getElementById('f-addr1').value.trim(),
            city:    document.getElementById('f-city').value.trim(),
            state:   document.getElementById('f-state').value.trim(),
            pin:     document.getElementById('f-pin').value.trim(),
            country: document.getElementById('f-country').value.trim(),
          }
        })
      });
      flashOk('ok-details');
      toast('📿 विवरण सहेजे गए');
    } catch(e) { setErr('err-details', e.message); }
    finally { btn.disabled = false; }
  }

  /* ── SAVE: password ── */
  async function savePassword() {
    const btn = document.getElementById('btn-pwd');
    const op  = document.getElementById('f-oldpwd').value;
    const np  = document.getElementById('f-newpwd').value;
    const cp  = document.getElementById('f-cfmpwd').value;
    setErr('err-pwd','');
    if (!op || !np || !cp) { setErr('err-pwd','सभी क्षेत्र भरें।'); return; }
    if (np.length < 6)     { setErr('err-pwd','नया पासवर्ड कम से कम 6 अक्षरों का हो।'); return; }
    if (np !== cp)         { setErr('err-pwd','पासवर्ड मेल नहीं खाते।'); return; }
    btn.disabled = true;
    try {
      await apiFetch('/api/auth/password', {
        method: 'POST',
        body: JSON.stringify({ old_password: op, new_password: np })
      });
      document.getElementById('f-oldpwd').value = '';
      document.getElementById('f-newpwd').value = '';
      document.getElementById('f-cfmpwd').value = '';
      flashOk('ok-pwd');
      toast('🔐 पासवर्ड सफलतापूर्वक बदला गया');
    } catch(e) { setErr('err-pwd', e.message); }
    finally { btn.disabled = false; }
  }

  /* ── LOGOUT ── */
  function doLogout() {
    SmAuth.logout();
    toast('👋 लॉगआउट हो गए। जय शिव!');
    setTimeout(() => window.location.href = '/', 1200);
  }

  /* ── UTILS ── */
  function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }
  function timeAgo(iso){
    const d = (Date.now()-new Date(iso).getTime())/1000;
    if(d<60)   return 'अभी';
    if(d<3600) return Math.floor(d/60)+' मिनट पहले';
    if(d<86400)return Math.floor(d/3600)+' घंटे पहले';
    if(d<2592000)return Math.floor(d/86400)+' दिन पहले';
    return new Date(iso).toLocaleDateString('hi-IN');
  }

  /* ── BOOT ── */
  SmAuth.init({ apiBase: API });

  (async function boot() {
    // Wait a tick for SmAuth to load session
    await new Promise(r=>setTimeout(r,50));
    const user = SmAuth.getUser();
    if (!user) {
      document.getElementById('app').innerHTML = `
        <div style="text-align:center;padding:4rem 1rem">
          <div style="font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold-light);margin-bottom:12px">🔱</div>
          <div style="font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:24px">
            प्रोफ़ाइल देखने के लिए लॉगिन करें
          </div>
          <button onclick="SmAuth._switchTab('login');SmAuth._openModal()" style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;background:rgba(124,77,255,.15);border:1px solid rgba(124,77,255,.4);color:var(--violet-l);padding:12px 28px;cursor:pointer">
            🕉️ लॉगिन करें
          </button>
        </div>`;
      return;
    }

    try {
      const data = await apiFetch(`/api/users/${user.id}/comments?limit=50`);
      renderApp(user, data.comments || []);
    } catch(e) {
      // Fallback: render with empty comments if endpoint not yet deployed
      renderApp(user, []);
    }
  })();
</script>
</body>
</html>
