<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO meta filled dynamically by JS from /events/{slug}/seo API -->
  <title id="page-title">Loading... | ShivMarg</title>
  <meta name="description" id="meta-desc" content="" />
  <meta property="og:title" id="og-title" content="" />
  <meta property="og:description" id="og-desc" content="" />
  <meta property="og:image" id="og-image" content="" />
  <meta property="og:type" content="article" />
  <link rel="canonical" id="canonical" href="" />

  <!-- JSON-LD injected by JS -->
  <script id="jsonld-event" type="application/ld+json"></script>
  <script id="jsonld-liveblog" type="application/ld+json"></script>

  <!-- ShivMarg fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --saffron:      #E8620A;
      --saffron-l:    #FFF3E8;
      --gold:         #B8841E;
      --gold-l:       #FFF8EC;
      --maroon:       #6E1A28;
      --maroon-dk:    #3D0D16;
      --cream:        #FEFAF3;
      --cream-dk:     #F4EDD8;
      --text-dk:      #2A1508;
      --text-md:      #5A3318;
      --text-lt:      #8B5E3C;
      --border:       rgba(184,132,30,0.22);
      --line:         #E2C070;
      --radius:       12px;
      --dot:          13px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text-dk);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    .f-header {
      background: linear-gradient(160deg, var(--maroon-dk) 0%, var(--maroon) 55%, #8B2235 100%);
      padding: 28px 20px 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .f-header::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 24px, rgba(184,132,30,.06) 24px, rgba(184,132,30,.06) 25px);
      pointer-events: none;
    }
    .f-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(232,98,10,.22);
      border: 1px solid rgba(232,98,10,.5);
      color: #FFB870;
      font-size: 10px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase;
      padding: 4px 14px; border-radius: 20px; margin-bottom: 12px;
    }
    .blink-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #FF4444;
      display: inline-block;
      animation: bdot 1.2s ease-in-out infinite;
    }
    @keyframes bdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }

    .f-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(20px, 5vw, 28px); font-weight: 700;
      color: #FFF5E0; letter-spacing: .5px; margin-bottom: 5px;
      position: relative;
    }
    .f-subtitle {
      font-size: 13px; color: rgba(255,240,200,.72);
      margin-bottom: 16px; position: relative;
    }
    .f-meta {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
      position: relative;
    }
    .f-pill {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: #FFE0B2; font-size: 12px;
      padding: 4px 13px; border-radius: 20px;
    }

    /* ── STATUSBAR ────────────────────────────────────────── */
    .statusbar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
      background: var(--cream-dk);
      border-bottom: 1px solid var(--line);
      padding: 9px 18px; font-size: 12px;
    }
    .live-pill {
      display: flex; align-items: center; gap: 7px;
      background: #DCFCE7; color: #15803D;
      padding: 4px 12px; border-radius: 20px;
      font-weight: 700; font-size: 11px; letter-spacing: .3px;
    }
    .status-right { color: var(--text-lt); }

    /* ── LOADING / ERROR ──────────────────────────────────── */
    .state-box {
      text-align: center; padding: 60px 20px;
      color: var(--text-lt); font-size: 14px;
    }
    .state-box .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--cream-dk);
      border-top-color: var(--saffron);
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TIMELINE WRAP ────────────────────────────────────── */
    .tl-wrap { max-width: 820px; margin: 0 auto; padding: 28px 18px 60px; }

    .day-group { margin-bottom: 36px; }
    .day-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.6px;
      text-transform: uppercase; color: var(--gold);
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px; padding-left: 28px;
    }
    .day-label::after { content: ''; flex: 1; height: 1px; background: var(--line); opacity: .5; }

    .tl-list { position: relative; }
    .tl-list::before {
      content: ''; position: absolute;
      left: 5px; top: 10px; bottom: 10px; width: 2px;
      background: linear-gradient(to bottom, var(--saffron), var(--gold) 50%, var(--line));
      border-radius: 2px;
    }

    .ev-row {
      display: flex; gap: 16px; align-items: flex-start;
      position: relative;
    }

    /* dot column */
    .dot-col {
      flex-shrink: 0; width: 12px;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 3px; z-index: 1;
    }
    .dot {
      width: var(--dot); height: var(--dot);
      border-radius: 50%;
      border: 2px solid var(--cream);
      flex-shrink: 0;
    }
    .dot.live    { background: #22C55E; animation: pg 1.8s ease-in-out infinite; }
    .dot.alert   { background: #EF4444; animation: pr 1.2s ease-in-out infinite; }
    .dot.update  { background: var(--saffron); }
    .dot.upcoming{ background: var(--gold); }
    .dot.done    { background: #9CA3AF; }
    @keyframes pg  { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.6)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0)} }
    @keyframes pr  { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.7)} 50%{box-shadow:0 0 0 7px rgba(239,68,68,0)} }

    .conn { width: 2px; background: var(--line); flex: 1; min-height: 20px; opacity: .5; }

    /* card */
    .ev-card {
      flex: 1; min-width: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 15px 11px;
      margin-bottom: 16px;
      position: relative; overflow: hidden;
      transition: box-shadow .18s;
    }
    .ev-card:hover { box-shadow: 0 3px 16px rgba(110,26,40,.1); }
    .ev-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .ev-card.live::before    { background: linear-gradient(to bottom,#22C55E,#16A34A); }
    .ev-card.alert::before   { background: linear-gradient(to bottom,#EF4444,#DC2626); }
    .ev-card.update::before  { background: linear-gradient(to bottom,var(--saffron),#C0520A); }
    .ev-card.upcoming::before{ background: linear-gradient(to bottom,var(--gold),var(--saffron)); }
    .ev-card.done::before    { background: #D1D5DB; }

    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      margin-bottom: 7px;
    }
    .card-time {
      font-size: 11px; font-weight: 700;
      color: var(--gold); letter-spacing: .3px;
      white-space: nowrap; margin-top: 2px; flex-shrink: 0;
    }
    .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      font-size: 9px; font-weight: 700; letter-spacing: .6px;
      padding: 2px 8px; border-radius: 10px; text-transform: uppercase;
    }
    .b-live     { background:#DCFCE7; color:#15803D; }
    .b-alert    { background:#FEE2E2; color:#991B1B; }
    .b-update   { background:var(--saffron-l); color:var(--saffron); }
    .b-upcoming { background:var(--gold-l); color:var(--gold); }
    .b-done     { background:#F3F4F6; color:#4B5563; }
    .b-photo    { background:#EFF6FF; color:#1D4ED8; }
    .b-video    { background:#FDF4FF; color:#7E22CE; }
    .b-pin      { background:#FEF3C7; color:#92400E; }

    .card-title {
      font-size: 14px; font-weight: 600;
      color: var(--text-dk); margin-bottom: 6px; line-height: 1.4;
    }
    .card-body {
      font-size: 13px; line-height: 1.7;
      color: var(--text-md);
    }

    /* media */
    .media-row { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
    .img-thumb {
      width: 72px; height: 56px; border-radius: 8px;
      object-fit: cover; border: 1px solid var(--border); cursor: pointer;
    }
    .vid-thumb {
      width: 72px; height: 56px; border-radius: 8px;
      background: #0f0a0a; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .play-btn {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(232,98,10,.9);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 10px; padding-left: 2px;
    }

    /* video lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.88);
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner { position: relative; width: min(640px, 94vw); }
    .lightbox-inner iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; }
    .lb-close {
      position: absolute; top: -36px; right: 0;
      background: none; border: none; color: #fff; font-size: 26px; cursor: pointer;
    }

    /* source */
    .source-row { display: flex; align-items: center; gap: 5px; margin-top: 9px; }
    .src-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-lt); flex-shrink: 0; }
    .src-txt { font-size: 11px; color: var(--text-lt); }

    /* load more */
    .load-more-wrap { text-align: center; margin-top: 20px; }
    .btn-load {
      background: none; border: 1px solid var(--line);
      border-radius: 8px; padding: 9px 28px;
      font-size: 13px; color: var(--text-md); cursor: pointer;
      transition: background .18s;
    }
    .btn-load:hover { background: var(--cream-dk); }

    /* empty */
    .empty { text-align: center; padding: 40px 20px; color: var(--text-lt); font-size: 14px; }

    @media (max-width: 500px) {
      .f-title { font-size: 18px; }
      .card-title { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- HEADER — filled by JS from festival API -->
<div class="f-header" id="fheader">
  <div class="f-badge"><span class="blink-dot"></span> Live Coverage</div>
  <div class="f-title" id="ftitle">Loading...</div>
  <div class="f-subtitle" id="fsubtitle"></div>
  <div class="f-meta" id="fmeta"></div>
</div>

<!-- STATUSBAR -->
<div class="statusbar">
  <div class="live-pill" id="live-pill">
    <span class="blink-dot"></span>
    <span id="live-count">Checking live updates...</span>
  </div>
  <div class="status-right" id="status-right">Loading...</div>
</div>

<!-- TIMELINE -->
<div class="tl-wrap">
  <div id="tl-root">
    <div class="state-box"><div class="spinner"></div>Timeline load ho rahi hai...</div>
  </div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="btn-load" id="load-more-btn" onclick="loadMore()">Aur updates dekho</button>
  </div>
</div>

<!-- VIDEO LIGHTBOX -->
<div class="lightbox" id="lb" onclick="closeLb(event)">
  <div class="lightbox-inner">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <iframe id="lb-frame" src="" allowfullscreen></iframe>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// CONFIG — change these two lines only
// ─────────────────────────────────────────────────────────────────
const API_BASE     = 'https://api.shivmarg.live';
const FESTIVAL_SLUG = (() => {
  // reads slug from URL path: /events/rath-yatra-2026  →  "rath-yatra-2026"
  const parts = window.location.pathname.split('/').filter(Boolean);
  const idx = parts.indexOf('events');
  return idx !== -1 && parts[idx + 1] ? parts[idx + 1] : 'rath-yatra-2026';
})();

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
let totalEvents   = 0;
let loadedEvents  = 0;
const PAGE_SIZE   = 30;
let pollTimer     = null;
let lastLiveCount = 0;

// ─────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────
async function boot() {
  await Promise.all([
    loadSEO(),
    loadTimeline(0),
  ]);
  startLivePolling();
}

// ─────────────────────────────────────────────────────────────────
// SEO — inject meta + JSON-LD
// ─────────────────────────────────────────────────────────────────
async function loadSEO() {
  try {
    const r = await fetch(`${API_BASE}/events/${FESTIVAL_SLUG}/seo`);
    if (!r.ok) return;
    const data = await r.json();
    const m = data.meta;

    document.getElementById('page-title').textContent   = m.title + ' | ShivMarg';
    document.title                                      = m.title + ' | ShivMarg';
    document.getElementById('meta-desc').content        = m.description;
    document.getElementById('og-title').content         = m.title;
    document.getElementById('og-desc').content          = m.description;
    document.getElementById('og-image').content         = m.og_image;
    document.getElementById('canonical').href           = m.canonical;

    if (data.json_ld && data.json_ld[0])
      document.getElementById('jsonld-event').textContent    = JSON.stringify(data.json_ld[0]);
    if (data.json_ld && data.json_ld[1])
      document.getElementById('jsonld-liveblog').textContent = JSON.stringify(data.json_ld[1]);
  } catch(e) { console.warn('SEO load failed', e); }
}

// ─────────────────────────────────────────────────────────────────
// TIMELINE LOAD
// ─────────────────────────────────────────────────────────────────
async function loadTimeline(skip) {
  try {
    const r = await fetch(`${API_BASE}/events/${FESTIVAL_SLUG}?limit=${PAGE_SIZE}&skip=${skip}`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();

    // Fill festival header once
    if (skip === 0) fillHeader(data.festival);

    totalEvents  = data.total;
    loadedEvents += data.events.length;

    if (skip === 0) {
      document.getElementById('tl-root').innerHTML = '';
    }

    if (data.events.length === 0 && skip === 0) {
      document.getElementById('tl-root').innerHTML =
        '<div class="empty">Koi event abhi tak add nahi kiya gaya.</div>';
      return;
    }

    renderEvents(data.events);
    updateStatusBar(data);
    toggleLoadMore();

  } catch(e) {
    document.getElementById('tl-root').innerHTML =
      `<div class="state-box">⚠️ Timeline load nahi hui. API check karo.<br><small>${e}</small></div>`;
  }
}

function loadMore() {
  loadTimeline(loadedEvents);
}

// ─────────────────────────────────────────────────────────────────
// LIVE POLLING — every 60s fetch /live endpoint
// ─────────────────────────────────────────────────────────────────
function startLivePolling() {
  updateLivePill();
  pollTimer = setInterval(updateLivePill, 60000);
}

async function updateLivePill() {
  try {
    const r = await fetch(`${API_BASE}/events/${FESTIVAL_SLUG}/live`);
    if (!r.ok) return;
    const data = await r.json();
    const count = data.count || 0;

    const pill = document.getElementById('live-pill');
    const cnt  = document.getElementById('live-count');

    if (count > 0) {
      pill.style.display = 'flex';
      cnt.textContent = `${count} live update${count > 1 ? 's' : ''} abhi chal rahi hai`;

      // If new live events appeared since last poll — refresh timeline silently
      if (count !== lastLiveCount) {
        loadedEvents = 0;
        await loadTimeline(0);
      }
    } else {
      cnt.textContent = 'Koi live update nahi abhi';
    }
    lastLiveCount = count;
  } catch(e) { /* silent */ }
}

// ─────────────────────────────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────────────────────────────
function fillHeader(festival) {
  if (!festival) return;
  document.getElementById('ftitle').textContent    = festival.name || '';
  document.getElementById('fsubtitle').textContent = festival.subtitle || festival.location || '';

  const meta = document.getElementById('fmeta');
  const pills = [];
  if (festival.start_date && festival.end_date) {
    pills.push(formatDateRange(festival.start_date, festival.end_date));
  }
  if (festival.location) pills.push('📍 ' + festival.location);
  if (festival.tags && festival.tags.length)
    pills.push('🏷️ ' + festival.tags.slice(0, 2).join(', '));

  meta.innerHTML = pills.map(p => `<div class="f-pill">${p}</div>`).join('');
}

function updateStatusBar(data) {
  const sr = document.getElementById('status-right');
  const lastEv = data.events[0];
  let lastStr = '';
  if (lastEv) {
    const dt = new Date(lastEv.created_at || lastEv.event_date);
    lastStr = ' · Last: ' + timeAgo(dt);
  }
  sr.textContent = `${data.total} kul updates${lastStr}`;
}

function toggleLoadMore() {
  const wrap = document.getElementById('load-more-wrap');
  wrap.style.display = loadedEvents < totalEvents ? 'block' : 'none';
}

// Group events by date and render day sections
function renderEvents(events) {
  const root = document.getElementById('tl-root');
  const groups = groupByDate(events);

  groups.forEach(({ label, events: evs }) => {
    const grpDiv = document.createElement('div');
    grpDiv.className = 'day-group';
    grpDiv.innerHTML = `<div class="day-label">${label}</div>`;
    const listDiv = document.createElement('div');
    listDiv.className = 'tl-list';

    evs.forEach((ev, i) => {
      listDiv.innerHTML += buildEventCard(ev, i === evs.length - 1);
    });

    grpDiv.appendChild(listDiv);
    root.appendChild(grpDiv);
  });
}

function buildEventCard(ev, isLast) {
  const status = ev.status || 'update';
  const dotCls = status;

  // time string
  const timeStr = ev.event_time
    ? formatTime(ev.event_time)
    : (ev.event_date ? formatDate(ev.event_date) : 'Abhi');

  // badges
  const badges = [];
  const badgeMap = {
    live: '<span class="badge b-live">🟢 Live</span>',
    alert: '<span class="badge b-alert">🔴 Alert</span>',
    update: '<span class="badge b-update">Update</span>',
    upcoming: '<span class="badge b-upcoming">Upcoming</span>',
    done: '<span class="badge b-done">Completed</span>',
  };
  if (badgeMap[status]) badges.push(badgeMap[status]);
  if (ev.pinned) badges.push('<span class="badge b-pin">📌 Pinned</span>');
  if (ev.media_tags && ev.media_tags.includes('photo'))
    badges.push('<span class="badge b-photo">Photo</span>');
  if (ev.media_tags && ev.media_tags.includes('video'))
    badges.push('<span class="badge b-video">Video</span>');

  // images
  let mediaHtml = '';
  const imgs = (ev.images || []).filter(Boolean);
  const hasVideo = !!ev.video_url;
  if (imgs.length || hasVideo) {
    const thumbs = imgs.slice(0, 3).map(url =>
      `<img class="img-thumb" src="${esc(url)}" alt="Event image" loading="lazy" onclick="openImg('${esc(url)}')">`
    ).join('');
    const vidThumb = hasVideo
      ? `<div class="vid-thumb" onclick="openVideo('${esc(ev.video_url)}')"><div class="play-btn">▶</div></div>`
      : '';
    mediaHtml = `<div class="media-row">${thumbs}${vidThumb}</div>`;
  }

  // source
  const srcHtml = ev.source
    ? `<div class="source-row"><div class="src-dot"></div><div class="src-txt">${esc(ev.source)}</div></div>`
    : '';

  const connCls = isLast ? 'style="min-height:0;height:0;"' : '';

  return `
  <div class="ev-row">
    <div class="dot-col">
      <div class="dot ${dotCls}"></div>
      <div class="conn" ${connCls}></div>
    </div>
    <div class="ev-card ${status}">
      <div class="card-top">
        <div class="card-time">${esc(timeStr)}</div>
        <div class="badges">${badges.join('')}</div>
      </div>
      <div class="card-title">${esc(ev.title || '')}</div>
      <div class="card-body">${ev.body || ''}</div>
      ${mediaHtml}
      ${srcHtml}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────────────────────────
function openVideo(url) {
  document.getElementById('lb-frame').src = url;
  document.getElementById('lb').classList.add('open');
}
function openImg(url) {
  window.open(url, '_blank');
}
function closeLb(e) {
  if (!e || e.target === document.getElementById('lb') || e.currentTarget.tagName === 'BUTTON') {
    document.getElementById('lb').classList.remove('open');
    document.getElementById('lb-frame').src = '';
  }
}

// ─────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────
function groupByDate(events) {
  const map = new Map();
  events.forEach(ev => {
    const key = ev.event_date || 'unknown';
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(ev);
  });
  return Array.from(map.entries()).map(([date, evs]) => ({
    label: buildDayLabel(date, evs),
    events: evs,
  }));
}

function buildDayLabel(dateStr, evs) {
  const today    = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);

  let prefix = '';
  if (dateStr === today)     prefix = 'Aaj · ';
  else if (dateStr === yesterday) prefix = 'Kal · ';

  const customLabel = evs.find(e => e.day_label)?.day_label;
  const formatted   = dateStr !== 'unknown' ? formatDate(dateStr) : '';

  return customLabel
    ? `${prefix}${formatted} · ${customLabel}`
    : `${prefix}${formatted}`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('hi-IN', { day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDateRange(start, end) {
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  const sm = s.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
  const em = e.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
  return `📅 ${sm} – ${em}`;
}

function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh   = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function timeAgo(date) {
  const sec = Math.floor((Date.now() - new Date(date)) / 1000);
  if (sec < 60)  return 'abhi abhi';
  if (sec < 3600) return Math.floor(sec/60) + ' min pehle';
  if (sec < 86400) return Math.floor(sec/3600) + ' ghante pehle';
  return Math.floor(sec/86400) + ' din pehle';
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
