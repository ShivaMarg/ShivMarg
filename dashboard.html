<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मेरी साधना — ShivMarg Dashboard</title>
<meta name="description" content="आपकी दैनिक पूजा, जप डायरी, संकल्प चैलेंज और परिवार — एक ही स्थान पर।">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Tiro+Devanagari+Sanskrit:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SHIVMARG · मेरी साधना DASHBOARD
   Design tokens derived from the Praveshdwar homepage identity.
   Signature element: the "बीज-माला" bead-ring — every completion
   state in this dashboard (puja, challenge, streak) renders as a
   ring of beads filling saffron, echoing the 108-bead mala tracker.
   ============================================================ */

:root{
  /* Temple courtyard palette */
  --cream:        #FBF3E3;
  --cream-deep:   #F3E6CC;
  --surface:      #FFFFFF;
  --saffron:      #E8722C;
  --saffron-deep: #C85A1B;
  --gold:         #C9962E;
  --gold-soft:    #E4C77C;
  --maroon:       #6E1F2A;
  --maroon-deep:  #4A1119;
  --tulsi:        #2F6B4F;   /* auspicious-green, used ONLY for completion states */
  --tulsi-soft:   #E4F0E9;
  --ink:          #3A2415;
  --ink-soft:     #7A6650;
  --line:         #E6D6B8;
  --shadow:       0 10px 30px -12px rgba(74,17,25,0.25);
  --shadow-sm:    0 4px 14px -6px rgba(74,17,25,0.18);

  --font-display: 'Cinzel Decorative', serif;
  --font-hindi:   'Tiro Devanagari Sanskrit', serif;
  --font-data:    'Inter', system-ui, sans-serif;

  --radius-arch: 999px 999px 10px 10px;
  --radius-card: 18px;
}

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family: var(--font-hindi);
  background:
    radial-gradient(1200px 500px at 50% -120px, var(--cream-deep), transparent),
    var(--cream);
  color: var(--ink);
  min-height:100vh;
  padding-bottom: 72px; /* mobile tab bar clearance */
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}
h1,h2,h3,.display{ font-family: var(--font-display); letter-spacing:0.02em; }
.data{ font-family: var(--font-data); }
button, input, select, textarea{ font-family: inherit; }
button{ cursor:pointer; }
a{ color: inherit; }
::selection{ background: var(--gold-soft); }

/* ---------- Scaffold ---------- */
.wrap{ max-width: 1180px; margin: 0 auto; padding: 0 18px; }

/* ---------- Header ---------- */
.topbar{
  position: sticky; top:0; z-index: 40;
  background: linear-gradient(180deg, rgba(251,243,227,0.97), rgba(251,243,227,0.9));
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
}
.topbar-inner{
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 18px; max-width: 1180px; margin:0 auto; gap:12px;
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:38px; height:38px; border-radius:50%;
  background: conic-gradient(from 180deg, var(--saffron), var(--gold), var(--maroon), var(--saffron));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-family: var(--font-display); font-size:16px;
  box-shadow: var(--shadow-sm);
}
.brand-text{ line-height:1.1; }
.brand-text b{ font-family: var(--font-display); font-size: 15px; color: var(--maroon-deep); display:block;}
.brand-text span{ font-size: 11px; color: var(--ink-soft); letter-spacing:0.08em; text-transform:uppercase; font-family: var(--font-data);}

.header-actions{ display:flex; align-items:center; gap:10px; }
.streak-chip{
  display:flex; align-items:center; gap:6px;
  background: var(--surface); border:1px solid var(--line);
  padding:6px 12px; border-radius: 999px; font-size:13px; font-weight:600;
  box-shadow: var(--shadow-sm);
}
.streak-chip .flame{ font-size:15px; }
.avatar-btn{
  width:36px; height:36px; border-radius:50%; border:2px solid var(--gold-soft);
  background: var(--maroon); color:#fff; font-family: var(--font-data); font-weight:700;
  display:flex; align-items:center; justify-content:center; font-size:14px;
}

/* ---------- Nav Tabs ---------- */
.tabbar{
  display:flex; gap:4px; padding: 8px 0 0 0; overflow-x:auto; scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{ display:none; }
.tab-btn{
  flex: 0 0 auto;
  background:transparent; border:none; padding:10px 16px 12px;
  font-size:14px; font-weight:600; color: var(--ink-soft);
  border-bottom: 3px solid transparent; white-space:nowrap;
  display:flex; align-items:center; gap:6px;
  transition: color .18s ease, border-color .18s ease;
}
.tab-btn .ic{ font-size:15px; }
.tab-btn.active{ color: var(--maroon-deep); border-bottom-color: var(--saffron); }
.tab-btn:hover:not(.active){ color: var(--maroon); }

/* ---------- Section visibility ---------- */
.view{ display:none; padding: 22px 0 40px; animation: fadeIn .32s ease; }
.view.active{ display:block; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

/* ---------- Hero strip (Overview) ---------- */
.hero{
  position:relative; overflow:hidden;
  background: linear-gradient(135deg, var(--maroon-deep), var(--maroon) 60%, var(--saffron-deep));
  border-radius: var(--radius-card);
  padding: 26px 24px 30px;
  color: #FBF3E3;
  box-shadow: var(--shadow);
  margin-bottom: 22px;
}
.hero::after{
  content:""; position:absolute; inset:0;
  background: radial-gradient(420px 220px at 88% -20%, rgba(228,199,124,0.35), transparent 70%);
  pointer-events:none;
}
.hero-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; }
.hero-greet{ font-size:13px; letter-spacing:0.1em; text-transform:uppercase; opacity:0.75; font-family: var(--font-data); margin-bottom:6px;}
.hero h1{ font-size: clamp(22px, 4vw, 30px); color:#fff; }
.hero-date{ margin-top:6px; font-size:13.5px; opacity:0.85; font-family: var(--font-data); }
.hero-stats{ display:flex; gap:22px; margin-top:20px; flex-wrap:wrap; }
.hero-stat{ }
.hero-stat .num{ font-family: var(--font-data); font-weight:800; font-size:26px; color: var(--gold-soft); line-height:1;}
.hero-stat .lbl{ font-size:12px; opacity:0.8; margin-top:4px; }

/* Arch divider used between hero and grid, and atop each card */
.arch-divider{ display:flex; justify-content:center; margin: 4px 0 18px; opacity:0.55; }

/* ---------- Bento grid ---------- */
.grid{ display:grid; grid-template-columns: repeat(12, 1fr); gap:16px; }
.card{
  grid-column: span 12;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  padding: 18px 18px 20px;
  box-shadow: var(--shadow-sm);
  position:relative;
}
.card::before{
  content:""; position:absolute; top:-1px; left:50%; transform:translateX(-50%);
  width:64px; height:6px; border-radius: 0 0 8px 8px;
  background: linear-gradient(90deg, var(--saffron), var(--gold));
  opacity:0.7;
}
@media (min-width: 720px){
  .col-4{ grid-column: span 4; }
  .col-6{ grid-column: span 6; }
  .col-8{ grid-column: span 8; }
  .col-12{ grid-column: span 12; }
}
.card-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
.card-title{ display:flex; align-items:center; gap:9px; }
.card-title .ic{ font-size:19px; }
.card-title h3{ font-size:16.5px; color: var(--maroon-deep); font-family: var(--font-hindi); font-weight:700;}
.card-link{ font-size:12.5px; font-weight:600; color: var(--saffron-deep); font-family: var(--font-data); background:none; border:none; }
.card-link:hover{ text-decoration:underline; }

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:10px 18px; border-radius:999px; font-size:13.5px; font-weight:700;
  border:1px solid transparent; transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:active{ transform: scale(0.97); }
.btn-primary{ background: linear-gradient(135deg, var(--saffron), var(--saffron-deep)); color:#fff; box-shadow: 0 6px 16px -6px rgba(200,90,27,0.55);}
.btn-primary:hover{ opacity:0.94; }
.btn-ghost{ background: var(--surface); border-color: var(--line); color: var(--maroon-deep); }
.btn-ghost:hover{ background: var(--cream-deep); }
.btn-tulsi{ background: var(--tulsi); color:#fff; }
.btn-sm{ padding:7px 13px; font-size:12.5px; }
.btn-block{ width:100%; }
.btn[disabled]{ opacity:0.5; pointer-events:none; }

/* ---------- Empty / loading states ---------- */
.empty{
  text-align:center; padding: 30px 14px; color: var(--ink-soft);
}
.empty .ic{ font-size:30px; display:block; margin-bottom:10px; }
.empty p{ font-size:13.5px; margin-bottom:14px; line-height:1.6; }
.skeleton{ background: linear-gradient(90deg, var(--cream-deep) 25%, #fff 50%, var(--cream-deep) 75%); background-size:200% 100%; animation: shimmer 1.3s infinite; border-radius:10px; }
@keyframes shimmer{ from{background-position:200% 0;} to{background-position:-200% 0;} }
.skel-row{ height:48px; margin-bottom:10px; }

/* ---------- Toast ---------- */
.toast-stack{ position:fixed; bottom:84px; left:50%; transform:translateX(-50%); z-index:100; display:flex; flex-direction:column; gap:8px; width:min(92%, 380px); }
.toast{
  background: var(--maroon-deep); color:#FBF3E3; padding:12px 16px; border-radius:12px;
  font-size:13.5px; box-shadow: var(--shadow); display:flex; align-items:center; gap:8px;
  animation: toastIn .25s ease;
}
.toast.err{ background: #7A2020; }
.toast.ok{ background: var(--tulsi); }
@keyframes toastIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed; inset:0; background: rgba(58,36,21,0.5); backdrop-filter: blur(2px);
  display:none; align-items:center; justify-content:center; z-index:90; padding:18px;
}
.modal-backdrop.active{ display:flex; }
.modal{
  background: var(--surface); border-radius: 20px; max-width: 440px; width:100%;
  padding: 24px 22px; box-shadow: var(--shadow); max-height:88vh; overflow-y:auto;
  animation: modalIn .22s ease;
}
@keyframes modalIn{ from{opacity:0; transform:translateY(12px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);} }
.modal h3{ font-size:18px; color:var(--maroon-deep); margin-bottom:6px; }
.modal .sub{ font-size:13px; color:var(--ink-soft); margin-bottom:18px; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; font-family: var(--font-data); }
.field input, .field select{
  width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--line);
  font-size:14px; background: var(--cream); color: var(--ink);
}
.field input:focus, .field select:focus{ outline:2px solid var(--saffron); outline-offset:1px; border-color:var(--saffron); }
.modal-actions{ display:flex; gap:10px; margin-top:18px; }
.modal-close{ position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; color:var(--ink-soft); }

/* ---------- Family member grid + card ---------- */
.member-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap:12px; }
.member-card{
  background: var(--cream); border:1.5px solid var(--line); border-radius:16px;
  padding:16px 12px; text-align:center; transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}
.member-card:hover{ transform: translateY(-3px); box-shadow: var(--shadow-sm); border-color: var(--gold-soft); cursor:pointer; }
.member-card .m-avatar{
  width:52px; height:52px; border-radius:50%; margin:0 auto 10px;
  background: linear-gradient(135deg, var(--maroon), var(--saffron-deep));
  color:#fff; font-family: var(--font-data); font-weight:700; font-size:19px;
  display:flex; align-items:center; justify-content:center; border:2px solid var(--gold-soft);
}
.member-card .m-name{ font-weight:700; font-size:14px; color:var(--maroon-deep); }
.member-card .m-relation{ font-size:11px; color:var(--ink-soft); font-family:var(--font-data); text-transform:capitalize; margin-bottom:8px;}
.member-card .m-today{ font-size:12px; font-family:var(--font-data); font-weight:600; color:var(--tulsi); background:var(--tulsi-soft); border-radius:999px; padding:3px 10px; display:inline-block; }
.member-card .m-you-tag{ font-size:9.5px; background:var(--gold-soft); color:var(--maroon-deep); padding:2px 7px; border-radius:999px; font-family:var(--font-data); font-weight:700; margin-left:5px;}

/* ---------- Member profile popup ---------- */
.mp-head{ display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.mp-avatar{
  width:58px; height:58px; border-radius:50%; flex:0 0 auto;
  background: linear-gradient(135deg, var(--maroon), var(--saffron-deep)); color:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-data); font-weight:700; font-size:20px;
  border:3px solid var(--gold-soft);
}
.mp-head h3{ font-size:18px; color:var(--maroon-deep); }
.mp-head .mp-relation{ font-size:12px; color:var(--ink-soft); font-family:var(--font-data); text-transform:capitalize; }
.mp-stats-row{ display:flex; gap:10px; margin-bottom:18px; }
.mp-stat{ flex:1; background:var(--cream); border-radius:12px; padding:10px 8px; text-align:center; }
.mp-stat .n{ font-family:var(--font-data); font-weight:800; font-size:19px; color:var(--saffron-deep); }
.mp-stat .l{ font-size:10.5px; color:var(--ink-soft); font-family:var(--font-data); margin-top:2px; }
.mp-section-title{ font-size:12.5px; font-weight:700; color:var(--maroon-deep); text-transform:uppercase; letter-spacing:0.04em; font-family:var(--font-data); margin: 16px 0 10px; display:flex; align-items:center; gap:6px;}
.mp-mantra-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); }
.mp-mantra-row:last-child{ border-bottom:none; }
.mp-mantra-icon{ font-size:18px; width:30px; text-align:center; }
.mp-mantra-name{ flex:1; font-size:13.5px; font-weight:600; }
.mp-mantra-count{ font-family:var(--font-data); font-size:12.5px; font-weight:700; color:var(--tulsi); }
.mp-bead-ring{ flex:0 0 auto; }
.mp-empty{ font-size:12.5px; color:var(--ink-soft); text-align:center; padding:14px 0; }
.mp-trend{ display:flex; align-items:flex-end; gap:3px; height:44px; margin-top:6px; }
.mp-trend .bar{ flex:1; background: var(--gold-soft); border-radius:3px 3px 0 0; min-height:2px; }
.mp-trend .bar.hot{ background: linear-gradient(180deg, var(--saffron), var(--saffron-deep)); }
.mp-challenge-pill{ display:flex; align-items:center; justify-content:space-between; background:var(--cream); border-radius:10px; padding:8px 12px; margin-bottom:8px; font-size:12.5px; }
.mp-note{ font-size:11.5px; color:var(--ink-soft); text-align:center; margin-top:14px; padding-top:12px; border-top:1px dashed var(--line); font-family:var(--font-data); }

/* ---------- Bottom tab bar (mobile) ---------- */
.mobile-tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background: var(--surface); border-top:1px solid var(--line);
  display:flex; box-shadow: 0 -6px 18px -10px rgba(74,17,25,0.3);
}
.mobile-tabbar .m-tab{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:9px 0 8px; background:none; border:none; color: var(--ink-soft); font-size:10.5px; font-family: var(--font-data); font-weight:600;
}
.mobile-tabbar .m-tab .ic{ font-size:19px; }
.mobile-tabbar .m-tab.active{ color: var(--saffron-deep); }
@media (min-width: 860px){ .mobile-tabbar{ display:none; } body{ padding-bottom:0; } }
@media (max-width: 859px){ .tabbar{ display:none; } }

/* ---------- Auth gate ---------- */
.gate{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.gate-card{ background:var(--surface); border-radius:20px; padding:34px 28px; text-align:center; max-width:380px; box-shadow: var(--shadow); }
.gate-card .om{ font-size:38px; margin-bottom:12px; }
.gate-card h2{ font-size:19px; color:var(--maroon-deep); margin-bottom:8px; }
.gate-card p{ font-size:13.5px; color:var(--ink-soft); margin-bottom:20px; line-height:1.6; }
</style>
</head>
<body>

<!-- ================= AUTH GATE ================= -->
<div class="gate" id="authGate">
  <div class="gate-card">
    <div class="om">🕉️</div>
    <h2>साधना डैशबोर्ड देखने हेतु लॉगिन करें</h2>
    <p>अपनी दैनिक पूजा, जप डायरी, संकल्प चैलेंज और परिवार डैशबोर्ड देखने के लिए कृपया अपने ShivMarg खाते से लॉगिन करें।</p>
    <a class="btn btn-primary btn-block" href="/login.html">लॉगिन करें</a>
  </div>
</div>

<!-- ================= APP SHELL ================= -->
<div id="app" style="display:none;">

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">ॐ</div>
        <div class="brand-text">
          <b>मेरी साधना</b>
          <span>ShivMarg Dashboard</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="streak-chip data" id="headerStreak"><span class="flame">🔥</span><span id="headerStreakNum">—</span></div>
        <button class="avatar-btn" id="avatarBtn" title="प्रोफ़ाइल व सेटिंग्स">?</button>
      </div>
    </div>
    <div class="wrap">
      <nav class="tabbar" id="tabbar">
        <button class="tab-btn active" data-view="overview"><span class="ic">🏠</span>अवलोकन</button>
        <button class="tab-btn" data-view="puja"><span class="ic">🪔</span>आज की पूजा</button>
        <button class="tab-btn" data-view="diary"><span class="ic">📿</span>जप डायरी</button>
        <button class="tab-btn" data-view="challenges"><span class="ic">🚩</span>संकल्प चैलेंज</button>
        <button class="tab-btn" data-view="family"><span class="ic">👨‍👩‍👧‍👦</span>परिवार</button>
        <button class="tab-btn" data-view="settings"><span class="ic">⚙️</span>सेटिंग्स</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- Views injected by JS: #view-overview #view-puja #view-diary #view-challenges #view-family #view-settings -->
    <div id="views-root"></div>
  </main>

  <nav class="mobile-tabbar" id="mobileTabbar">
    <button class="m-tab active" data-view="overview"><span class="ic">🏠</span>अवलोकन</button>
    <button class="m-tab" data-view="puja"><span class="ic">🪔</span>पूजा</button>
    <button class="m-tab" data-view="diary"><span class="ic">📿</span>डायरी</button>
    <button class="m-tab" data-view="challenges"><span class="ic">🚩</span>चैलेंज</button>
    <button class="m-tab" data-view="family"><span class="ic">👨‍👩‍👧‍👦</span>परिवार</button>
  </nav>
</div>

<div class="toast-stack" id="toastStack"></div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* Dashboard JS is loaded from dashboard.js (kept separate for readability) */
</script>
<script src="dashboard.js"></script>
</body>
</html>
