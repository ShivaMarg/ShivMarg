<script id="PATCH_JS">

/* ── HELPERS ── */
function hindDate() {
  const now = new Date();
  const months = ['जनवरी','फ़रवरी','मार्च','अप्रैल','मई','जून',
                  'जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
  return now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / 86400000);
}

(function initFestivalBanner() {
  const dismissed = sessionStorage.getItem('sm_festival_dismissed');
  if (dismissed) return;

  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate();

  const fest = FESTIVALS.find(f => {
    const diff = Math.abs(
      new Date(now.getFullYear(), m - 1, d) -
      new Date(now.getFullYear(), f.month - 1, f.day)
    ) / 86400000;
    return diff <= f.window;
  });

  if (!fest) return;

  const banner = document.getElementById('festival-banner');
  if (!banner) return;

  document.getElementById('fb-icon').textContent  = fest.icon;
  document.getElementById('fb-title').textContent = fest.title;
  document.getElementById('fb-sub').textContent   = fest.sub;
  banner.style.setProperty('--fb-bg', fest.bg);
  banner.style.setProperty('--fb-accent', fest.accent);

  // Make it link somewhere
  const inner = banner.querySelector('.festival-inner');
  banner.style.cursor = 'pointer';
  inner.addEventListener('click', function(e) {
    if (e.target.closest('.festival-close')) return;
    window.location.href = fest.url;
  });

  banner.style.display = 'block';
})();

window.closeFestivalBanner = function() {
  const b = document.getElementById('festival-banner');
  if (b) {
    b.style.transition = 'max-height 0.4s ease, opacity 0.3s ease';
    b.style.opacity = '0';
    b.style.maxHeight = '0';
    b.style.overflow = 'hidden';
    setTimeout(() => b.style.display = 'none', 400);
  }
  sessionStorage.setItem('sm_festival_dismissed', '1');
};


/* ════════════════════════════════════════════════════════════════════
   FEATURE 2 — PANCHANG STRIP
   Uses simple lunisolar approximation — replace the panchang() call
   with your real engine (panchang_engine.js) if available.
   ════════════════════════════════════════════════════════════════════ */
(function initPanchangStrip() {
  const strip = document.getElementById('panchang-content');
  if (!strip) return;

  /* ── Try to get data from your existing Panchang engine/API ── */
  // If panchang_engine.js exposes a global, use it; otherwise fall back to static.
  let data = null;

  if (typeof window.getPanchangData === 'function') {
    try { data = window.getPanchangData(); } catch(e) {}
  }

  /* ── Fallback: compute approximation ── */
  if (!data) {
    const now = new Date();
    // Tithi: synodic month ~29.53d, new moon ~Jan 11 2024
    const newMoon = new Date('2024-01-11');
    const daysSince = (now - newMoon) / 86400000;
    const tithi = Math.floor((daysSince % 29.53) * (30 / 29.53)) + 1;
    const tithiNames = [
      'प्रतिपदा','द्वितीया','तृतीया','चतुर्थी','पंचमी',
      'षष्ठी','सप्तमी','अष्टमी','नवमी','दशमी',
      'एकादशी','द्वादशी','त्रयोदशी','चतुर्दशी','पूर्णिमा/अमावस्या',
      'प्रतिपदा','द्वितीया','तृतीया','चतुर्थी','पंचमी',
      'षष्ठी','सप्तमी','अष्टमी','नवमी','दशमी',
      'एकादशी','द्वादशी','त्रयोदशी','चतुर्दशी','अमावस्या'
    ];
    const nakshatraNames = [
      'अश्विनी','भरणी','कृत्तिका','रोहिणी','मृगशिरा','आर्द्रा',
      'पुनर्वसु','पुष्य','आश्लेषा','मघा','पूर्वफाल्गुनी','उत्तरफाल्गुनी',
      'हस्त','चित्रा','स्वाति','विशाखा','अनुराधा','ज्येष्ठा',
      'मूल','पूर्वाषाढ़ा','उत्तराषाढ़ा','श्रावण','धनिष्ठा','शतभिषा',
      'पूर्वाभाद्रपद','उत्तराभाद्रपद','रेवती'
    ];
    const varNames = ['रविवार','सोमवार','मंगलवार','बुधवार','गुरुवार','शुक्रवार','शनिवार'];
    const nakshIdx = Math.floor((daysSince * 27 / 29.53) % 27);
    const tithiIdx = Math.min(Math.floor(tithi) - 1, 29);

    // Sunrise/sunset approx for Delhi
    const sunriseH = 6, sunriseM = 10, sunsetH = 18, sunsetM = 45;
    // Rahukaal: changes by day
    const rahukaal = ['4:30-6:00','7:30-9:00','15:00-16:30','12:00-13:30',
                      '13:30-15:00','10:30-12:00','9:00-10:30'];
    const rahu = rahukaal[now.getDay()];

    data = {
      var:    varNames[now.getDay()],
      tithi:  tithiNames[tithiIdx] || 'द्वादशी',
      naksh:  nakshatraNames[nakshIdx] || 'रोहिणी',
      sunrise: `${sunriseH}:${String(sunriseM).padStart(2,'0')} AM`,
      sunset:  `${sunsetH}:${String(sunsetM).padStart(2,'0')} PM`,
      rahu:    rahu,
    };
  }

  // Build strip HTML
  const items = [
    { label: 'वार',      value: data.var    || data.day    },
    { label: 'तिथि',     value: data.tithi  || data.tithiName },
    { label: 'नक्षत्र',  value: data.naksh  || data.nakshatraName },
    { label: 'सूर्योदय', value: data.sunrise },
    { label: 'सूर्यास्त', value: data.sunset },
    { label: 'राहुकाल',  value: data.rahu   || data.rahukaal },
  ].filter(i => i.value);

  const html = items.map(i =>
    `<div class="panchang-item">
      <span class="panchang-label">${i.label}</span>
      <span class="panchang-value">${i.value}</span>
    </div>`
  ).join('') +
  `<a class="panchang-link" href="/Hindi-Panchang-Patara/">
    पूर्ण पंचांग →
  </a>`;

  strip.innerHTML = html;
})();

let currentMantraIdx = 0;

(function initAajKaMantra() {
  const el = document.getElementById('aaj-ka-mantra');
  if (!el) return;

  // Pick mantra based on day-of-year for consistency
  const idx = dayOfYear(new Date()) % AAJ_KA_MANTRAS.length;
  currentMantraIdx = idx;

  renderMantra(idx);
  buildNavDots();

  // Set date text
  const dateEl = document.getElementById('akm-date-text');
  if (dateEl) dateEl.textContent = hindDate();
})();

function renderMantra(idx) {
  const m = AAJ_KA_MANTRAS[idx];
  if (!m) return;
  const sl = document.getElementById('akm-shloka');
  const me = document.getElementById('akm-meaning');
  const de = document.getElementById('akm-deity-label');
  if (sl) sl.innerHTML = m.shloka.replace(/\n/g, '<br>');
  if (me) me.textContent = m.meaning;
  if (de) de.textContent = m.deity;
  updateNavDots(idx);
}

function buildNavDots() {
  const nav = document.getElementById('akm-nav');
  if (!nav) return;
  // Show 5 dots: current + 2 on each side
  nav.innerHTML = '';
  const total = Math.min(5, AAJ_KA_MANTRAS.length);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('span');
    d.className = 'akm-nav-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('role', 'button');
    d.setAttribute('aria-label', `मंत्र ${i + 1}`);
    d.addEventListener('click', function() {
      const newIdx = (currentMantraIdx - 2 + i + AAJ_KA_MANTRAS.length) % AAJ_KA_MANTRAS.length;
      currentMantraIdx = newIdx;
      renderMantra(newIdx);
    });
    nav.appendChild(d);
  }
}

function updateNavDots(idx) {
  const dots = document.querySelectorAll('.akm-nav-dot');
  // Relative position: the current mantra is at dot index 2 (middle)
  const offset = idx;
  dots.forEach(function(d, i) {
    const relIdx = (offset - 2 + i + AAJ_KA_MANTRAS.length) % AAJ_KA_MANTRAS.length;
    d.classList.toggle('active', relIdx === idx);
  });
}

window.shareAajKaMantra = function() {
  const m = AAJ_KA_MANTRAS[currentMantraIdx];
  if (!m) return;
  const text = encodeURIComponent(m.whatsapp);
  window.open('https://wa.me/?text=' + text, '_blank');
};

<style id="MARQUEE_PATCH_CSS">
/* Override existing marquee styles */
.marquee-wrap {
  position: relative;
  z-index: 10;
  overflow: hidden;
  border-top: 1px solid rgba(212,160,23,0.15);
  border-bottom: 1px solid rgba(212,160,23,0.15);
  background: rgba(0,0,0,0.3);
  padding: 14px 0;
  margin-bottom: 70px;
  /* pause on hover */
  cursor: default;
}
.marquee-wrap:hover .marquee-track {
  animation-play-state: paused;
}

/* The track: two identical halves side by side */
.marquee-track {
  display: flex;
  width: max-content;
  /* JS will set the animation-duration based on content width */
  animation: marquee-infinite linear infinite;
  will-change: transform;
}

/* Single keyframe — JS overrides duration */
@keyframes marquee-infinite {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.marquee-item {
  font-family: 'Tiro Devanagari Sanskrit', serif;

  position: absolute;
  top: 0;
  bottom: 0;
  width: 80px;
  z-index: 2;
  pointer-events: none;
}

}

  right: 0;
  background: linear-gradient(270deg, rgba(0,0,0,0.5), transparent);
}
</style>

<script id="MARQUEE_PATCH_JS">
(function () {

  /* ── Mantra items to scroll ── */
  const MANTRAS = [
    { text: 'ॐ नमः शिवाय',             dot: true  },
    { text: 'हरे कृष्ण हरे राम',        dot: true  },
    { text: 'जय माता दी',              dot: true  },
    { text: 'श्री राम जय राम जय जय राम', dot: true },
    { text: 'ॐ गं गणपतये नमः',         dot: true  },
    { text: 'ॐ श्रीं महालक्ष्म्यै नमः', dot: true  },
    { text: 'सरस्वती नमस्तुभ्यम्',      dot: true  },
    { text: 'हर हर महादेव',            dot: true  },
    { text: 'ॐ नमो भगवते वासुदेवाय',   dot: true  },
    { text: 'जय हनुमान',               dot: true  },
    { text: 'ॐ भूर्भुवः स्वः',          dot: true  },
    { text: 'क्रीं काली क्रीं',          dot: true  },
    { text: 'ॐ ह्रां ह्रीं ह्रौं सः सूर्याय नमः', dot: true },
    { text: 'जय श्री राम',             dot: true  },
    { text: 'ॐ त्र्यम्बकं यजामहे',      dot: true  },
    { text: 'विश्वं विष्णुर्वषट्कारः',  dot: true  },
  ];

  /* px per second — tweak to taste */
  const SPEED = 55;

  function buildMarquee() {
    const wrap = document.querySelector('.marquee-wrap');
    if (!wrap) return;

    /* Remove old track if present */
    const old = wrap.querySelector('.marquee-track');
    if (old) old.remove();

    /* Build one set of items */
    function makeSet() {
      return MANTRAS.map(m => {
        let html = `<span class="marquee-item">${m.text}</span>`;
        if (m.dot) html += `<span class="marquee-dot" aria-hidden="true">✦</span>`;
        return html;
      }).join('');
    }

    /* Duplicate the set so the seam is invisible */
    const track = document.createElement('div');
    track.className = 'marquee-track';
    track.setAttribute('aria-hidden', 'true');
    track.innerHTML = makeSet() + makeSet();
    wrap.appendChild(track);

    /* Measure one set width, set animation duration */
    requestAnimationFrame(function () {
      const totalWidth = track.scrollWidth;
      const halfWidth  = totalWidth / 2;
      const duration   = halfWidth / SPEED;
      track.style.animationDuration = duration.toFixed(2) + 's';
    });
  }

  /* Run on DOMContentLoaded or immediately if already loaded */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildMarquee);
  } else {
    buildMarquee();
  }

  /* Re-build if fonts load late (Devanagari font can shift widths) */
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () {
      buildMarquee();
    });
  }

})();
</script>
