<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Audio Test</title>

  <style>
    body {
      background: #111;
      color: white;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .player-box {
      text-align: center;
      background: #1e1e1e;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    button {
      font-size: 22px;
      padding: 12px 25px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      background: #6a0dad;
      color: white;
      margin-top: 15px;
    }

    button:hover {
      background: #8e2de2;
    }
  </style>
</head>

<body>

  <div class="player-box">
    <h2>Simple YouTube Audio Test</h2>
    <button id="playBtn">▶ Play</button>
  </div>

  <!-- Hidden Player -->
  <div id="player" style="width:0;height:0;overflow:hidden;"></div>

  <!-- YouTube API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let player;
    let isPlaying = false;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: "SPra9UgnS5M", // your test video
        playerVars: {
          controls: 0,
          modestbranding: 1
        }
      });
    }

    document.getElementById("playBtn").onclick = function () {

      if (!player) {
        alert("Player not ready yet. Wait 2 seconds.");
        return;
      }

      if (!isPlaying) {
        player.playVideo();
        this.innerHTML = "⏸ Pause";
        isPlaying = true;
      } else {
        player.pauseVideo();
        this.innerHTML = "▶ Play";
        isPlaying = false;
      }
    };
  </script>

</body>
</html>
