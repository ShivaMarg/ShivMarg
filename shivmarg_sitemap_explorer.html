*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text-primary)}

.stat{background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);padding:6px 14px;text-align:center}
.stat-val{font-size:18px;font-weight:500;color:var(--text-primary)}
.stat-lab{font-size:11px;color:var(--text-muted);margin-top:1px}
.search-bar{position:relative;margin-bottom:1rem}
.search-bar input{width:100%;padding:9px 12px 9px 36px;font-size:14px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary)}
.search-bar input:focus{outline:none;border-color:var(--border-accent)}
.search-bar i{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted)}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.chip{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-secondary);transition:all 0.15s}
.chip:hover{border-color:var(--border-stronger);color:var(--text-primary)}
.chip.active{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent)}
.section{margin-bottom:0.75rem;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface-2)}
.sec-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background 0.1s}
.sec-header:hover{background:var(--surface-1)}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sec-meta{flex:1;min-width:0}
.sec-name{font-size:14px;font-weight:500;color:var(--text-primary)}
.sec-path{font-size:11px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500}
.badge-count{background:var(--surface-1);color:var(--text-secondary);border:0.5px solid var(--border)}
.badge-freq{background:var(--bg-success);color:var(--text-success)}
.badge-pri{background:var(--bg-accent);color:var(--text-accent)}
.chevron{font-size:14px;color:var(--text-muted);transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.url-list{display:none;border-top:0.5px solid var(--border)}
.url-list.open{display:block}
.url-row{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 60px;border-bottom:0.5px solid var(--border);transition:background 0.1s}
.url-row:last-child{border-bottom:none}
.url-row:hover{background:var(--surface-1)}
.url-slug{flex:1;font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.url-slug span{color:var(--text-muted)}
.url-link{font-size:11px;color:var(--text-accent);text-decoration:none;display:flex;align-items:center;gap:3px;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.url-row:hover .url-link{opacity:1}
.pri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.no-results{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:14px}

const BASE = 'https://www.shivmarg.live';
let openSections = new Set(['shiva']);
let activeFilter = 'all';

function priColor(p){
  const v=parseFloat(p||'0.80');
  if(v>=0.90) return '#639922';
  if(v>=0.80) return '#378ADD';
  return '#888780';
}

function renderFilters(){
  const bar=document.getElementById('filter-bar');
  const filters=[{id:'all',label:'All sections'},...data.map(d=>({id:d.id,label:d.label.split(' ')[0]}))];
  bar.innerHTML=filters.map(f=>`<div class="chip ${activeFilter===f.id?'active':''}" onclick="setFilter('${f.id}')">${f.label}</div>`).join('');
}

function setFilter(id){activeFilter=id;if(id!=='all')openSections.add(id);render();}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const list=document.getElementById('list');
  let totalShow=0,html='';

  const filtered=data.filter(s=>activeFilter==='all'||s.id===activeFilter);

  filtered.forEach(sec=>{
    const matchSection=sec.label.toLowerCase().includes(q);
    const urlsFiltered=sec.urls.filter(u=>
      !q||u.label.toLowerCase().includes(q)||u.slug.toLowerCase().includes(q)||matchSection
    );
    if(!urlsFiltered.length) return;
    totalShow+=urlsFiltered.length;
    const isOpen=openSections.has(sec.id)||q.length>0;

    html+=`<div class="section">
      <div class="sec-header" onclick="toggle('${sec.id}')">
        <div class="sec-icon" style="background:${sec.color}">${sec.icon}</div>
        <div class="sec-meta">
          <div class="sec-name">${sec.label}</div>
          <div class="sec-path">${sec.urls[0]?BASE+sec.urls[0].slug:''}</div>
        </div>
        <div class="sec-badges">
          <span class="badge badge-count">${urlsFiltered.length} URLs</span>
          <span class="badge badge-freq">daily</span>
          <span class="badge badge-pri" style="background:${priColor(sec.pri)}1a;color:${priColor(sec.pri)}">p${sec.pri}</span>
        </div>
        <i class="ti ti-chevron-down chevron ${isOpen?'open':''}" aria-hidden="true"></i>
      </div>
      <div class="url-list ${isOpen?'open':''}">
        ${urlsFiltered.map(u=>`
        <div class="url-row">
          <div class="pri-dot" style="background:${priColor(u.priority||'0.80')}"></div>
          <div class="url-slug"><span>shivmarg.live</span>${u.slug} — ${u.label}</div>
          <a class="url-link" href="${BASE+u.slug}" target="_blank">visit <i class="ti ti-external-link" style="font-size:11px"></i></a>
        </div>`).join('')}
      </div>
    </div>`;
  });

  if(!html) html=`<div class="no-results"><i class="ti ti-search-off" style="font-size:32px;display:block;margin-bottom:8px"></i>No URLs match "<strong>${q}</strong>"</div>`;
  list.innerHTML=html;

  document.getElementById('s-total').textContent=totalShow||data.reduce((a,s)=>a+s.urls.length,0);
  document.getElementById('s-sections').textContent=filtered.length;
  document.getElementById('s-daily').textContent=Math.round(totalShow*0.85)||Math.round(data.reduce((a,s)=>a+s.urls.length,0)*0.85);

  renderFilters();
}

function toggle(id){
  if(openSections.has(id)) openSections.delete(id);
  else openSections.add(id);
  render();
}

render();
</script>
