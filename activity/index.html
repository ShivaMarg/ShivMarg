<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मेरी सक्रियता — ShivaMarg</title>
<link rel="icon" type="image/svg+xml" href="/images/ShivMarg.png" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep:    #04020E;
    --bg-card:    #0C0520;
    --bg-card2:   #110830;
    --border:     rgba(124,77,255,0.22);
    --border-h:   rgba(124,77,255,0.5);
    --gold:       #C9A84C;
    --gold-light: #E8C96A;
    --violet:     #7C4DFF;
    --violet-l:   #B39DDB;
    --text:       #F3EEFF;
    --text-muted: rgba(243,238,255,0.5);
    --text-dim:   rgba(243,238,255,0.3);
    --red:        #FF8A80;
    --success:    #80CBC4;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,77,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(4,2,16,0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1rem; color: var(--gold-light); letter-spacing: 2px;
    text-decoration: none;
  }
  .nav-back {
    font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 2px;
    color: var(--text-muted); text-transform: uppercase;
    background: none; border: 1px solid var(--border);
    padding: 6px 14px; cursor: pointer;
    text-decoration: none; transition: all .25s;
  }
  .nav-back:hover { border-color: var(--border-h); color: var(--text); }
  .page { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

  /* Header */
  .activity-hero {
    border: 1px solid var(--border);
    background: var(--bg-card);
    padding: 22px 28px; margin-bottom: 1.5rem;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .activity-hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--violet), var(--gold), var(--violet), transparent);
  }
  .activity-title { font-family: 'Cinzel Decorative', serif; font-size: 1.15rem; color: var(--gold-light); }
  .activity-sub   { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 6px; }
  .back-pill {
    font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--violet-l); background: rgba(124,77,255,0.1);
    border: 1px solid rgba(124,77,255,0.3);
    padding: 8px 16px; text-decoration: none; transition: all .2s;
  }
  .back-pill:hover { background: rgba(124,77,255,0.2); border-color: rgba(124,77,255,0.5); }

  /* Stat grid */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 1.5rem;
  }
  @media(max-width: 700px){ .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 18px 16px; text-align: center;
  }
  .stat-card .num { font-family: 'Cinzel Decorative', serif; font-size: 1.5rem; color: var(--gold); }
  .stat-card .lbl { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

  /* Sections */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 24px 28px; margin-bottom: 1.25rem;
    position: relative;
  }
  .card-title {
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 3px;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 18px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }

  /* Info rows (meta details) */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 28px; }
  @media(max-width:560px){ .info-grid { grid-template-columns: 1fr; } }
  .info-row { display: flex; flex-direction: column; gap: 4px; }
  .info-row .k { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .info-row .v { font-size: 0.95rem; color: var(--text); }

  /* Tag chips - pages visited / favorite deities */
  .chip-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--violet-l); background: rgba(124,77,255,0.1);
    border: 1px solid rgba(124,77,255,0.25);
    padding: 6px 12px;
  }
  .chip .ct { color: var(--gold); font-family: 'Cinzel Decorative', serif; font-size: 0.75rem; }
  .chip.deity { color: var(--gold-light); background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.25); }
  .chip.deity .ct { color: var(--violet-l); }

  /* Activity timeline */
  .activity-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    animation: fadein .3s ease;
  }
  .activity-item:last-child { border-bottom: none; padding-bottom: 0; }
  @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .activity-icon {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(124,77,255,0.12); border: 1px solid var(--border-h);
    font-size: 1rem;
  }
  .activity-body { flex: 1; min-width: 0; }
  .activity-page {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 3px 10px; margin-bottom: 6px;
    text-decoration: none; transition: all .2s;
  }
  .activity-page:hover { background: rgba(201,168,76,0.2); border-color: rgba(201,168,76,0.5); }
  .activity-desc { font-size: 0.92rem; color: var(--text); line-height: 1.5; }
  .activity-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 5px; font-style: italic; }

  /* Filter tabs */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .filter-btn {
    font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); background: none; border: 1px solid var(--border);
    padding: 7px 14px; cursor: pointer; transition: all .2s;
  }
  .filter-btn.active { background: rgba(124,77,255,0.15); color: var(--violet-l); border-color: var(--border-h); }
  .filter-btn:hover:not(.active) { color: var(--text); border-color: var(--border-h); }

  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--text-dim); font-style: italic; font-size: 0.95rem;
  }
  .empty-state .sym { font-size: 2rem; display: block; margin-bottom: 10px; opacity: .4; }
  .loader {
    text-align: center; padding: 2rem;
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 3px;
    color: var(--text-dim); text-transform: uppercase;
  }
  .loader::after { content: ''; display: inline-block; width: 12px; height: 12px; border: 1px solid var(--violet); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; margin-left: 10px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .load-more-wrap { text-align: center; margin-top: 16px; }
  .btn-load-more {
    font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
    background: rgba(124,77,255,0.1); border: 1px solid var(--border-h);
    color: var(--violet-l); padding: 10px 24px; cursor: pointer; transition: all .25s;
  }
  .btn-load-more:hover { background: rgba(124,77,255,0.2); }
  .btn-load-more:disabled { opacity: 0.45; cursor: wait; }
</style>
</head>
<body>

<div class="page" id="app">
  <div class="loader" id="page-loader">सक्रियता लोड हो रही है</div>
</div>

<script src="/js/auth2.js"></script>
<script src="/js/nav.js"></script>

<script>
  const API = 'https://www.api.shivmarg.live';

  /* ─────────────────────────────────────────
     URL ROUTING
     Expected pattern: /user/<username>/myactivity
  ───────────────────────────────────────── */
  function getUsernameFromURL() {
    const parts = window.location.pathname.split('/').filter(Boolean);
    // parts: ['user', 'username', 'myactivity']
    if (parts.length >= 2 && parts[0] === 'user') return parts[1];

    // fallback: hash style /user/#username/myactivity (rare)
    const hash = window.location.hash.replace('#', '').split('/')[0].trim();
    if (hash) return hash;

    return null;
  }

  function authHeader() {
    const tok = SmAuth.getToken();
    return tok ? { 'Authorization': 'Bearer ' + tok } : {};
  }
  async function apiFetch(path, opts={}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...authHeader() },
      ...opts
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'अनुरोध विफल हुआ');
    return data;
  }

  /* ── PAGE TITLES (same map as profile page) ── */
  const PAGE_TITLES = {
    'shiv-aarti':         'शिव आरती',
    'maha-mrityunjaya':   'महा मृत्युंजय मंत्र',
    'kashi-vishwanath':   'काशी विश्वनाथ',
    'om-namah-shivaya':   'ॐ नमः शिवाय',
    'rudrashtakam':       'रुद्राष्टकम्',
    'shiv-chalisa':       'शिव चालीसा',
  };
  function pageTitle(id){ return PAGE_TITLES[id] || (id||'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

  const PAGE_PREFIXES = {
    'Shiva-mantras': [
      'shiv-kavacham','shiv-aarti','bilvashtakam','lingashtakam',
      'shiva-panchakshara-stotram','namami-samisam-nirvanrupam',
      'kilaka-stotram','shiva-mahamrityunjaya-mantra','maha-mrityunjaya',
      'shiva-jyotirlinga-stotram','rudrashtakam','shiv-chalisa',
      'om-namah-shivaya','kashi-vishwanath','jay-jay-sankar-jay-tripurari',
      'shiv-kailasho-ke-washi','Vishwanthashtakam'
    ],
    'durga-mantras': [
      'nav-durga-mantra','durga-chalisha',
      'devi-aparadha-kshamapana-stotram','himachal-kichhuo-ne-kelainh-bichari'
    ],
    'Krishna-Mahamantras': [
      'krishna-mahamantras','Hare-krishna-mahamantras',
      'Om-Namo-Bhagavate-Vasudevaya-ॐ-नमो-भगवते-वासुदेवाय',
      'achyutam-keshavam','madhurasthakam','shri-krishna-chalisha',
      'damodarashtakam','krishnashtakam','108-names-of-krishna'
    ],
    'Vishnu-mantras': ['vishnu-mantras'],
    'Surya-mantras':  ['surya-mantras','surya-gayatri-mantra'],
    'Bhagavad-Gita':  ['gita-chapter-2-nishkam-karma'],
    'Vidyapati-Geet-Sangrah': [
      'Ge-Mai-Chandramukhi-San-Gauri-Hamar-Chhathi-vidyapati-geet',
      'ugna-re-mor-katai-gela','bar-sukhsar-paol-tua-teere',
      'jogi-ek-thaadh-chhai-anganwa-mein',
      'chhoti-moti-tutli-madaiya-mein-gauri-dai',
      'gauri-dauri-dauri-kahthin-he','chanan-bhel-visham-sar-re'
    ]
  };
  const _PAGE_PREFIX_LOOKUP = {};
  Object.entries(PAGE_PREFIXES).forEach(([prefix, ids]) => {
    ids.forEach(id => { _PAGE_PREFIX_LOOKUP[id] = prefix; });
  });
  function getPageUrl(page_id) {
    if (!page_id) return '#';
    const prefix = _PAGE_PREFIX_LOOKUP[page_id];
    return prefix ? `/${prefix}/${page_id}` : `/${page_id}`;
  }

  /* ── EVENT TYPE → icon / label ── */
  const EVENT_META = {
    'page_view':     { icon: '👁️', label: 'देखा' },
    'comment_posted':{ icon: '💬', label: 'टिप्पणी की' },
    'like':          { icon: '🙏', label: 'पसंद किया' },
    'audio_play':    { icon: '🔊', label: 'सुना' },
    'share':         { icon: '🔗', label: 'साझा किया' },
    'login':         { icon: '🔑', label: 'लॉगिन' },
    'search':        { icon: '🔍', label: 'खोजा' },
  };
  function eventMeta(t){ return EVENT_META[t] || { icon: '🔱', label: t || 'सक्रियता' }; }

  /* ── UTILS ── */
  function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function timeAgo(iso){
    if(!iso) return '';
    const d = (Date.now()-new Date(iso).getTime())/1000;
    if(d<60)   return 'अभी';
    if(d<3600) return Math.floor(d/60)+' मिनट पहले';
    if(d<86400)return Math.floor(d/3600)+' घंटे पहले';
    if(d<2592000)return Math.floor(d/86400)+' दिन पहले';
    return new Date(iso).toLocaleDateString('hi-IN');
  }
  function fullDate(iso){
    if(!iso) return '—';
    return new Date(iso).toLocaleString('hi-IN', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }
  function getProfileUrl(username) { return `/profile/${username}`; }

  /* ── STATE ── */
  let allActivity = [];
  let currentFilter = 'all';

  /* ── RENDER ── */
  function renderApp(user, summary, activity) {
    document.title = `मेरी सक्रियता — ${user.display_name || user.username}`;

    const pagesVisited   = summary.pages_visited || {};
    const favoriteDeities = summary.favorite_deity_tags || {};

    const pagesVisitedEntries = Object.entries(pagesVisited).sort((a,b)=>b[1]-a[1]);
    const deityEntries        = Object.entries(favoriteDeities).sort((a,b)=>b[1]-a[1]);

    const eventTypes = [...new Set(activity.map(a=>a.event_type).filter(Boolean))];

    document.getElementById('app').innerHTML = `
      <div class="activity-hero">
        <div>
          <div class="activity-title">🔱 मेरी सक्रियता</div>
          <div class="activity-sub">@${escHtml(user.username)}</div>
        </div>
        <a class="back-pill" href="${getProfileUrl(user.username)}">← प्रोफ़ाइल पर वापस</a>
      </div>

      <div class="stats-grid">
        <div class="stat-card"><div class="num">${summary.login_count ?? 0}</div><div class="lbl">लॉगिन</div></div>
        <div class="stat-card"><div class="num">${summary.comments_count ?? 0}</div><div class="lbl">टिप्पणियाँ</div></div>
        <div class="stat-card"><div class="num">${pagesVisitedEntries.length}</div><div class="lbl">पृष्ठ देखे</div></div>
        <div class="stat-card"><div class="num">${deityEntries.length}</div><div class="lbl">प्रिय देवता</div></div>
      </div>

      <div class="card">
        <div class="card-title">खाता जानकारी</div>
        <div class="info-grid">
          <div class="info-row"><span class="k">अंतिम लॉगिन</span><span class="v">${fullDate(summary.last_login_at)}</span></div>
          <div class="info-row"><span class="k">अंतिम बार देखा गया</span><span class="v">${fullDate(summary.last_seen_at)}</span></div>
          <div class="info-row"><span class="k">पसंदीदा भाषा</span><span class="v">${escHtml(summary.preferred_language || 'hindi')}</span></div>
          <div class="info-row"><span class="k">डिवाइस प्रकार</span><span class="v">${escHtml(summary.device_type || '—')}</span></div>
          <div class="info-row"><span class="k">शहर</span><span class="v">${escHtml(summary.city || '—')}</span></div>
          <div class="info-row"><span class="k">राज्य</span><span class="v">${escHtml(summary.state || '—')}</span></div>
        </div>
      </div>

      ${deityEntries.length ? `
      <div class="card">
        <div class="card-title">प्रिय देवता</div>
        <div class="chip-list">
          ${deityEntries.map(([tag,count])=>`
            <span class="chip deity">🕉️ ${escHtml(tag)} <span class="ct">${count}</span></span>
          `).join('')}
        </div>
      </div>` : ''}

      ${pagesVisitedEntries.length ? `
      <div class="card">
        <div class="card-title">सबसे ज्यादा देखे गए पृष्ठ</div>
        <div class="chip-list">
          ${pagesVisitedEntries.map(([page,count])=>`
            <a class="chip" href="${getPageUrl(page)}" style="text-decoration:none">🔱 ${escHtml(pageTitle(page))} <span class="ct">${count}</span></a>
          `).join('')}
        </div>
      </div>` : ''}

      <div class="card">
        <div class="card-title">हाल की सक्रियता</div>
        <div class="filter-row" id="filter-row">
          <button class="filter-btn active" data-filter="all">सभी</button>
          ${eventTypes.map(t=>`<button class="filter-btn" data-filter="${t}">${eventMeta(t).icon} ${eventMeta(t).label}</button>`).join('')}
        </div>
        <div id="activity-list"></div>
      </div>
    `;

    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderActivityList();
      });
    });

    renderActivityList();
  }

  function renderActivityList() {
    const list = document.getElementById('activity-list');
    const items = currentFilter === 'all'
      ? allActivity
      : allActivity.filter(a => a.event_type === currentFilter);

    if (items.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="sym">🔱</span>
          अभी तक कोई सक्रियता नहीं।
        </div>`;
      return;
    }

    list.innerHTML = items.map(a=>{
      const meta = eventMeta(a.event_type);
      const pageLine = a?.page_id
  ? `<a class="activity-page" href="https://shivmarg.live/${getPageUrl?.(a.page_id) || '#'}">
       🔱 ${escHtml(pageTitle?.(a.page_id) || 'Untitled')} →
     </a><br>`
  : '';
      const descParts = [];
      if (meta.label) descParts.push(meta.label);
      if (a.category) descParts.push(`(${escHtml(a.category)})`);
      const desc = descParts.join(' ');
      const durationStr = a.duration ? ` &middot; ${a.duration} सेकंड` : '';

      return `
        <div class="activity-item">
          <div class="activity-icon">${meta.icon}</div>
          <div class="activity-body">
            ${pageLine}
            <div class="activity-desc">${desc || 'सक्रियता'}</div>
            <div class="activity-meta">${timeAgo(a.created_at)}${durationStr}</div>
          </div>
        </div>`;
    }).join('');
  }

  /* ── NOT AUTHORIZED / NOT FOUND ── */
  function showMessage(title, sub, showLogin) {
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:4rem 1rem">
        <div style="font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold-light);margin-bottom:12px">🔱</div>
        <div style="font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">
          ${title}
        </div>
        ${sub ? `<div style="font-size:.9rem;color:var(--text-dim);margin-bottom:24px">${sub}</div>` : ''}
        ${showLogin
          ? `<button onclick="SmAuth._switchTab('login');SmAuth._openModal()" style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;background:rgba(124,77,255,.15);border:1px solid rgba(124,77,255,.4);color:var(--violet-l);padding:12px 28px;cursor:pointer;margin-top:8px">🕉️ लॉगिन करें</button>`
          : `<a href="/" style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;background:rgba(124,77,255,.15);border:1px solid rgba(124,77,255,.4);color:var(--violet-l);padding:12px 28px;text-decoration:none">🕉️ होम पर जाएँ</a>`
        }
      </div>`;
  }

  /* ── BOOT ── */
  SmAuth.init({ apiBase: API });

  (async function boot() {
    await new Promise(r => setTimeout(r, 50));

    const urlUsername  = getUsernameFromURL();
    const loggedInUser = SmAuth.getUser();

    if (!loggedInUser) {
      showMessage('सक्रियता देखने के लिए लॉगिन करें', '', true);
      return;
    }

    // Private page: only owner can view their own activity
    if (!urlUsername || urlUsername !== loggedInUser.username) {
      showMessage('अनधिकृत', 'आप केवल अपनी सक्रियता देख सकते हैं।', false);
      return;
    }

    try {
      const res = await apiFetch('/api/activity/me?limit=50');
      allActivity = res.recent_activity || [];
      renderApp(loggedInUser, res.summary || {}, allActivity);
    } catch(e) {
      showMessage('सक्रियता लोड करने में त्रुटि', escHtml(e.message), false);
    }
  })();
</script>
<script src="/js/streak-widget.js"></script>

<script src="/js/chatbot.js"></script>
<script src="/js/last-visited.js"></script>
</body>
